<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢卡牌洗牌系統</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }

        .deck-container {
            position: relative;
            width: 180px;
            height: 250px;
            margin-bottom: 50px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #333;
            /* 讓過渡效果更明顯 */
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center center;
            backface-visibility: hidden;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #ffcb05;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #3d7dca;
            box-shadow: 0 5px 0 #c7a008;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #c7a008;
        }
    </style>
</head>
<body>

    <h2 style="color: #ffcb05;">Pokemon Deck Shuffler</h2>
    
    <div class="deck-container" id="deck"></div>

    <button onclick="shuffleDeck()">即刻洗牌！</button>

    <script>
        const cardImages = [
            'https://images.pokemontcg.io/base1/4_hires.png', // 噴火龍
            'https://images.pokemontcg.io/base1/58_hires.png', // 皮卡丘
            'https://images.pokemontcg.io/swsh4/25_hires.png', // 皮卡丘V
            'https://images.pokemontcg.io/base1/10_hires.png', // 超夢
            'https://images.pokemontcg.io/base1/2_hires.png',  // 水箭龜
            'https://images.pokemontcg.io/base1/15_hires.png'  // 妙蛙花
        ];

        const deck = document.getElementById('deck');
        let cardElements = [];

        // 初始化
        function init() {
            cardImages.forEach((img, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundImage = `url('${img}')`;
                card.style.zIndex = i;
                // 初始微偏，像一疊牌
                card.style.transform = `translate(${i * 2}px, ${-i * 2}px)`;
                deck.appendChild(card);
                cardElements.push(card);
            });
        }

        async function shuffleDeck() {
            // 第一階段：全部噴散開來
            cardElements.forEach((card, i) => {
                const randomX = (Math.random() - 0.5) * 500;
                const randomY = (Math.random() - 0.5) * 400;
                const randomRotate = (Math.random() - 0.5) * 360;
                
                card.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${randomRotate}deg)`;
            });

            // 等待動畫播放一半 (400ms)
            await new Promise(res => setTimeout(res, 500));

            // 第二階段：隨機排序後收回
            const shuffledIndices = [...Array(cardElements.length).keys()].sort(() => Math.random() - 0.5);
            
            cardElements.forEach((card, i) => {
                const newZIndex = shuffledIndices[i];
                card.style.zIndex = newZIndex;
                // 回到中心點，並加上微小的偏移量
                card.style.transform = `translate(${newZIndex * 2}px, ${-newZIndex * 2}px) rotate(0deg)`;
            });
        }

        init();
    </script>
</body>
</html>
