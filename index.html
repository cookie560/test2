<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 官方規格對戰系統 - 多龍ex構築版</title>
    <style>
        :root {
            --ptcg-blue: #3d7dca;
            --ptcg-yellow: #ffcb05;
            --field-green: #2e7d32; /* 官方桌墊綠 */
            --slot-border: rgba(255, 255, 255, 0.3);
            --card-w: 75px;
            --card-h: 105px;
        }

        body {
            margin: 0; background-color: #121212; color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        /* 官方風格場地 (參考影片佈局) */
        .play-mat {
            position: relative;
            width: 960px; height: 560px;
            background-color: var(--field-green);
            border: 6px solid #1b5e20; border-radius: 20px;
            margin-top: 15px; display: grid;
            grid-template-columns: 160px 1fr 160px;
            padding: 20px; gap: 15px; box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            perspective: 1000px;
        }

        /* 裝飾用的中央圓圈 */
        .mat-circle {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 260px; height: 260px; border: 4px solid rgba(255,255,255,0.2);
            border-radius: 50%; pointer-events: none;
        }

        /* 區域插槽通用樣式 */
        .slot {
            border: 2px solid var(--slot-border); border-radius: 8px;
            background: rgba(0,0,0,0.1); position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .slot::after {
            content: attr(data-label); font-size: 10px; color: rgba(255,255,255,0.3);
            position: absolute; bottom: 4px; width: 100%; text-align: center;
        }

        /* 佈局區域 (符合影片 00:00:12) */
        .prize-area { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 8px; }
        .battle-center { display: flex; flex-direction: column; gap: 25px; }
        .active-row { display: flex; justify-content: center; height: 160px; gap: 60px; }
        .bench-row { display: flex; justify-content: center; gap: 10px; height: 110px; }
        .side-area { display: flex; flex-direction: column; gap: 20px; }

        /* 卡牌設計 (3D 翻轉結構) */
        .card-container {
            width: var(--card-w); height: var(--card-h);
            perspective: 1000px; position: absolute;
            cursor: grab; transition: transform 0.2s;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            border-radius: 6px; border: 2px solid white; backface-visibility: hidden;
            background-size: cover; background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .card-front { transform: rotateY(180deg); }
        /* 官方牌背素材 */
        .card-back { background-image: url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); }

        /* 抽牌飛行的動畫 */
        .drawing-flying { animation: drawFly 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        @keyframes drawFly {
            0% { transform: translate(0,0) rotateY(0deg) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotateY(180deg) rotate(var(--tr)) scale(0.7); opacity: 0; }
        }

        /* 下方手牌區 */
        .hand-container {
            position: fixed; bottom: 0; width: 100%; height: 150px;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; gap: -15px; backdrop-filter: blur(10px); z-index: 100;
        }
        /* 手牌狀態不需要 z-index 疊放，而是水平併排 */
        .hand-card { position: relative !important; top: auto !important; left: auto !important; margin: 0 -10px; }

        /* 控制按鈕 */
        .controls { margin-top: 10px; }
        button {
            padding: 8px 16px; background: var(--ptcg-yellow); border: none; border-radius: 6px;
            color: #333; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="controls"><button onclick="shuffleDeck()">🌀 洗牌</button></div>

<div class="play-mat">
    <div class="mat-circle"></div>

    <div class="prize-area">
        <div class="slot" style="width:65px; height:90px;" data-label="PRIZE"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
    </div>

    <div class="battle-center">
        <div class="active-row">
            <div class="slot" style="width:110px; height:154px;" data-label="敵方出戰"></div>
            <div class="slot" id="my-active" style="width:110px; height:154px;" data-label="我的出戰" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
        </div>
        <div class="bench-row" id="bench">
            <div class="slot" style="width:85px; height:119px;" data-label="備戰" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:85px; height:119px;"></div>
            <div class="slot" style="width:85px; height:119px;"></div>
            <div class="slot" style="width:85px; height:119px;"></div>
            <div class="slot" style="width:85px; height:119px;"></div>
        </div>
    </div>

    <div class="side-area">
        <div class="slot" style="height:110px;" data-label="棄牌區"></div>
        <div class="slot" id="deck-zone" style="height:140px; border:none; background:none; cursor:pointer;" onclick="drawCard()">
            <div class="card-container" style="top:5px; left:30px; z-index:1;"><div class="card-back" style="width:70px; height:98px;"></div></div>
            <div class="card-container" id="deck-top" style="top:0; left:25px; z-index:2;"><div class="card-back" style="width:70px; height:98px; cursor:pointer;"></div></div>
            <div style="position:absolute; bottom:0; width:100%; text-align:center;">牌庫: <span id="deck-count">60</span></div>
        </div>
    </div>
</div>

<div class="hand-container" id="hand"></div>

<script>
    // 1. 從你提供的圖片 (image_48a626.jpg) 中提取的真實副牌數據
    const deckDataList = [
        { img: 'https://images.pokemontcg.io/sv6/130_hires.png', count: 3 }, // 多龍巴魯托ex
        { img: 'https://images.pokemontcg.io/sv6/129_hires.png', count: 4 }, // 多龍梅西亞
        { img: 'https://images.pokemontcg.io/sv6/128_hires.png', count: 4 }, // 多龍
        { img: 'https://images.pokemontcg.io/sv1/191_hires.png', count: 4 }, // 高級球
        { img: 'https://images.pokemontcg.io/sv1/194_hires.png', count: 4 }, // 嵌套球
        { img: 'https://images.pokemontcg.io/swsh8/148_hires.png', count: 2 }, // 奇巴納
        { img: 'https://images.pokemontcg.io/sm12/energy2_hires.png', count: 8 }, // 格鬥能量卡 (模擬總張數)
        { img: 'https://images.pokemontcg.io/swsh8/142_hires.png', count: 8 }   // 丹帝 (支援者) (模擬補齊張數)
    ];

    let deck = [];
    let hand = [];

    // 初始化：根據圖片張數建立 60 張標準牌組
    function init() {
        deck = [];
        deckDataList.forEach(item => {
            for(let i=0; i<item.count; i++) {
                deck.push({ img: item.img, id: Math.random() });
            }
        });
        // 確保剛好 60 張，不足補丹帝 (純模擬用)
        while(deck.length < 60) {
            deck.push({ img: 'https://images.pokemontcg.io/swsh8/142_hires.png', id: Math.random() });
        }
        updateUI();
    }

    function shuffleDeck() {
        // 使用 Fisher-Yates 演算法
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        alert("牌組已按官方規則完成洗牌！");
    }

    // 2. 物理感抽牌動畫 (從牌庫飛出手牌)
    async function drawCard() {
        if(deck.length === 0) return;
        
        const deckTop = document.getElementById('deck-top');
        const rect = deckTop.getBoundingClientRect();
        
        // 建立飛行的卡片
        const flying = document.createElement('div');
        flying.className = "card-container drawing-flying";
        flying.style.left = rect.left + "px";
        flying.style.top = rect.top + "px";
        flying.innerHTML = `<div class="card-inner"><div class="card-back"></div></div>`;
        document.body.appendChild(flying);

        // 獲取數據
        const card = deck.shift();
        updateUI();

        // 飛行路徑與旋轉角度
        const destX = window.innerWidth / 2 - rect.left;
        const destY = window.innerHeight - rect.top - 100;
        const destR = (Math.random() - 0.5) * 30; // 隨機旋轉角度

        flying.style.setProperty('--tx', `${destX}px`);
        flying.style.setProperty('--ty', `${destY}px`);
        flying.style.setProperty('--tr', `${destR}deg`);

        // 動畫結束後加入手牌數據
        setTimeout(() => {
            document.body.removeChild(flying);
            hand.push(card);
            renderHand();
        }, 1000);
    }

    function renderHand() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = "";
        hand.forEach((card, i) => {
            const el = document.createElement('div');
            el.className = "card-container hand-card";
            el.innerHTML = `<div class="card-inner" style="transform:rotateY(180deg)"><div class="card-front" style="background-image:url('${card.img}')"></div></div>`;
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            handDiv.appendChild(el);
        });
    }

    function allowDrop(e) { e.preventDefault(); }
    function dropCard(e) {
        const idx = e.dataTransfer.getData("idx");
        const card = hand[idx];
        hand.splice(idx, 1);
        
        e.currentTarget.innerHTML = `<img src="${card.img}" style="width:100%; height:100%; border-radius:6px;">`;
        renderHand();
    }

    function updateUI() {
        document.getElementById('deck-count').innerText = deck.length;
    }

    init();
</script>
</body>
</html>
