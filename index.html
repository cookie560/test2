<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 視覺模擬 - 真實洗牌與抽卡</title>
    <style>
        :root {
            --mat-green: #1a531a;
            --ptcg-blue: #1976d2;
            --ptcg-gold: #ffca28;
            --card-w: 72px;
            --card-h: 100px;
        }

        body {
            margin: 0; background: #121212; color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        /* 1. 對戰桌墊設計 */
        .play-mat {
            position: relative; width: 950px; height: 580px;
            background-color: var(--mat-green);
            border: 5px solid #0d3b0d; border-radius: 25px;
            margin-top: 10px; display: grid;
            grid-template-columns: 160px 1fr 160px;
            padding: 25px; gap: 15px; box-sizing: border-box;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            perspective: 1000px; /* 3D 視角 */
        }

        /* 插槽樣式 */
        .slot {
            border: 2px solid rgba(255,255,255,0.3); border-radius: 8px;
            background: rgba(0,0,0,0.15); position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .slot::after {
            content: attr(data-label); font-size: 10px; color: rgba(255,255,255,0.4);
            position: absolute; bottom: 5px; width: 100%; text-align: center;
        }

        /* 佈局區域 */
        .prize-area { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 10px; }
        .battle-center { display: flex; flex-direction: column; gap: 30px; }
        .active-row { display: flex; justify-content: center; height: 160px; }
        .bench-row { display: flex; justify-content: center; gap: 12px; height: 110px; }
        .side-stack { display: flex; flex-direction: column; gap: 20px; }

        /* 2. 卡牌物件核心 (3D 翻轉結構) */
        .card-container {
            width: var(--card-w); height: var(--card-h);
            perspective: 1000px; position: absolute;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 卡片正面與背面 */
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            border-radius: 6px; border: 2px solid #fff;
            backface-visibility: hidden; /* 隱藏背面 */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); font-size: 9px; font-weight: bold;
        }

        .card-front { background: #eee; color: #333; transform: rotateY(180deg); }
        .card-back { background: var(--ptcg-blue); color: white; border-color: white; }

        /* 3. 抽牌飛行的動畫 (Flip + Fly) */
        .flying-draw {
            animation: flyInHand 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .flying-draw .card-inner {
            animation: flip3d 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* 洗牌抖動動畫 */
        .shuffling {
            animation: shuffleShuffle 1s ease-in-out infinite;
        }

        /* 底部手牌區 */
        .hand-container {
            position: fixed; bottom: 0; width: 100%; height: 150px;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center;
            align-items: center; gap: 5px; backdrop-filter: blur(15px);
            z-index: 10;
        }
        .hand-card { margin: 0 -5px; position: relative !important; top: auto !important; left: auto !important; }

        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--ptcg-gold); color: #212121; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px #c6a700;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #c6a700; }
        #log { color: var(--ptcg-gold); margin-bottom: 5px; height: 20px; }

        /* --- CSS 動畫定義 --- */
        @keyframes flip3d {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }

        @keyframes flyInHand {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            50% { transform: translate(-100px, -200px) rotate(-15deg) scale(1.1); }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0.6); opacity: 0; }
        }

        @keyframes shuffleShuffle {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5px, -5px) rotate(2deg); }
            50% { transform: translate(-5px, 5px) rotate(-2deg); }
            75% { transform: translate(5px, 5px) rotate(2deg); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div id="log">多龍巴魯托牌組準備中...</div>

<div class="play-mat">
    <div class="prize-area">
        <div class="slot" style="width:65px; height:90px;" data-label="PRIZE"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
    </div>

    <div class="battle-center">
        <div class="active-row">
            <div class="slot" id="my-active" style="width:115px; height:160px; border-color:var(--ptcg-gold);" data-label="出戰位置" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
        </div>
        <div class="bench-row" id="bench">
            <div class="slot" style="width:80px; height:112px;" data-label="備戰" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
        </div>
    </div>

    <div class="side-stack">
        <div class="slot" style="height:100px;" data-label="棄牌區"></div>
        <div class="slot" id="deck-zone" style="height:150px; border:none; background:none; cursor:pointer;" onclick="drawCard()">
            <div id="deck-visual-stack" style="position:relative; width:100%; height:100%;">
                </div>
            <div style="position:absolute; bottom:0; width:100%; text-align:center;">牌庫: <span id="count">60</span></div>
        </div>
        <button onclick="shuffleDeck()">🌀 真實洗牌</button>
    </div>
</div>

<div class="hand-container" id="hand"></div>

<script>
    const deckList = [
        { name: "Dreepy", count: 4 }, { name: "Drakloak", count: 4 }, { name: "Dragapult ex", count: 3 },
        { name: "Meowth ex", count: 2 }, { name: "Bloodmoon Ursaluna ex", count: 1 },
        { name: "Lillie's Determination", count: 4 }, { name: "Ultra Ball", count: 4 },
        { name: "Darkness Energy", count: 3 }, { name: "Fire Energy", count: 3 }
    ];

    let deck = [];
    let hand = [];
    let isShuffling = false;

    function init() {
        deck = [];
        deckList.forEach(item => {
            for(let i=0; i<item.count; i++) {
                deck.push({ name: item.name, id: Math.random() });
            }
        });
        updateDeckVisual();
        document.getElementById('log').innerText = "副牌已載入，準備洗牌。";
    }

    // 建立視覺牌堆
    function updateDeckVisual() {
        const stack = document.getElementById('deck-visual-stack');
        stack.innerHTML = "";
        for(let i=0; i < Math.min(deck.length, 12); i++) {
            const d = document.createElement('div');
            d.className = "card-container";
            d.style.zIndex = i;
            d.style.top = i + "px"; d.style.left = (30 - i) + "px";
            d.innerHTML = `<div class="card-inner"><div class="card-back">POKÉ</div></div>`;
            stack.appendChild(d);
        }
        document.getElementById('count').innerText = deck.length;
    }

    // 🌀 真實洗牌動畫與邏輯
    function shuffleDeck() {
        if (isShuffling || deck.length === 0) return;
        isShuffling = true;
        
        const stack = document.getElementById('deck-visual-stack');
        stack.classList.add('shuffling');
        document.getElementById('log').innerText = "正在進行切牌與交錯洗牌...";

        // Fisher-Yates 演算法
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }

        setTimeout(() => {
            stack.classList.remove('shuffling');
            updateDeckVisual();
            isShuffling = false;
            document.getElementById('log').innerText = "洗牌完成。";
        }, 1500); // 動畫時間
    }

    // 📥 翻牌飛入手牌動畫
    async function drawCard() {
        if(deck.length === 0 || isShuffling) return;
        
        const deckZone = document.getElementById('deck-zone');
        const rect = deckZone.getBoundingClientRect();
        
        const card = deck.shift();
        
        // 建立動畫卡片 (3D 翻轉結構)
        const flying = document.createElement('div');
        flying.className = "card-container flying-draw";
        flying.style.left = rect.left + "px";
        flying.style.top = rect.top + "px";
        flying.innerHTML = `
            <div class="card-inner">
                <div class="card-back">POKÉ</div>
                <div class="card-front"><div style="padding:5px">${card.name}</div></div>
            </div>
        `;
        document.body.appendChild(flying);

        // 計算目的地 (手牌區中央)
        const destX = window.innerWidth / 2 - rect.left - rect.width/2;
        const destY = window.innerHeight - rect.top - rect.height/2 - 100;
        flying.style.setProperty('--tx', `${destX}px`);
        flying.style.setProperty('--ty', `${destY}px`);
        flying.style.setProperty('--tr', `${(Math.random()-0.5)*30}deg`);

        updateDeckVisual(); // 更新剩餘牌組視覺

        setTimeout(() => {
            document.body.removeChild(flying);
            hand.push(card);
            renderHand();
        }, 1200); // 卡片飛向手牌的時間
    }

    function renderHand() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = "";
        hand.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = "card-container hand-card";
            el.innerHTML = `<div class="card-inner"><div class="card-front" style="transform:rotateY(180deg)"><div style="padding:5px">${c.name}</div></div></div>`;
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            handDiv.appendChild(el);
        });
    }

    function allowDrop(e) { e.preventDefault(); }
    function dropCard(e) {
        const idx = e.dataTransfer.getData("idx");
        const card = hand[idx];
        hand.splice(idx, 1);
        e.currentTarget.innerHTML = `<div class="card" style="width:100%; height:100%; border:none;">${card.name}</div>`;
        renderHand();
    }

    init();
</script>
</body>
</html>
