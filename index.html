<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Ultimate - Dragapult Setup</title>
    <style>
        :root {
            --mat-green: #143314;
            --ptcg-gold: #ffcb05;
            --card-w: 80px;
            --card-h: 112px;
        }

        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Oswald', sans-serif; overflow: hidden; height: 100vh;
        }

        /* 頂部功能列 */
        .hud {
            height: 60px; background: #111; display: flex; 
            align-items: center; justify-content: space-around;
            border-bottom: 2px solid var(--ptcg-gold); box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* 3D 對戰場地 */
        .table {
            position: relative; width: 1000px; height: 620px;
            margin: 10px auto; background: var(--mat-green);
            border-radius: 40px; border: 10px solid #0d210d;
            display: grid; grid-template-columns: 160px 1fr 160px;
            padding: 20px; gap: 15px; box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            perspective: 1500px;
        }

        .zone {
            border: 2px dashed rgba(255,255,255,0.1); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; position: relative;
            background: rgba(255,255,255,0.02); transition: 0.3s;
        }
        .zone.hover { background: rgba(255, 203, 5, 0.1); border-color: var(--ptcg-gold); }

        /* 洗牌動畫：物理分層 */
        .deck-container { position: relative; cursor: pointer; }
        .deck-card {
            width: var(--card-w); height: var(--card-h); position: absolute;
            background-image: url('https://limitlesstcg.s3.us-west-2.amazonaws.com/etc/pokemon-cardback.png');
            background-size: cover; border-radius: 6px; border: 1px solid #fff;
            transition: transform 0.4s ease;
        }

        @keyframes shuffle-left { 
            0%, 100% { transform: translate(0,0) rotate(0); }
            50% { transform: translate(-100px, -15px) rotate(-15deg); } 
        }
        @keyframes shuffle-right { 
            0%, 100% { transform: translate(0,0) rotate(0); }
            50% { transform: translate(100px, 15px) rotate(15deg); } 
        }
        .shf-l { animation: shuffle-left 0.4s infinite; }
        .shf-r { animation: shuffle-right 0.4s infinite; }

        /* 卡牌物件 */
        .card-instance {
            width: var(--card-w); height: var(--card-h); cursor: grab;
            border-radius: 6px; border: 2px solid white; background-size: cover;
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .card-instance:hover { transform: scale(1.05) translateY(-5px); z-index: 100; }
        
        .hp-bar {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: #e53935; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: bold;
        }

        /* 佈局區域 */
        .bench-row { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .side-stack { display: flex; flex-direction: column; gap: 15px; }

        /* 手牌區 */
        .hand-dock {
            position: fixed; bottom: -20px; width: 100%; height: 160px;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 30px;
        }
        .hand-item { margin-left: -30px; transition: 0.3s; transform-origin: bottom center; }

        .btn {
            background: var(--ptcg-gold); border: none; padding: 8px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="hud">
    <button class="btn" onclick="startShuffle()">🌀 物理洗牌</button>
    <button class="btn" onclick="draw()">📥 抽卡</button>
    <div id="game-status">多龍巴魯托 ex 構築測試</div>
    <div>牌組: <span id="deck-count">60</span> | 棄牌: <span id="discard-count">0</span></div>
</div>

<div class="table">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="zone" style="height:90px;"></div><div class="zone" style="height:90px;"></div>
        <div class="zone" style="height:90px;"></div><div class="zone" style="height:90px;"></div>
        <div class="zone" style="height:90px;"></div><div class="zone" style="height:90px;"></div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center;">
        <div id="active-spot" class="zone" style="width:120px; height:168px;" ondragover="over(event)" ondrop="drop(event, 'active')">
            <span style="color:rgba(255,255,255,0.1)">ACTIVE</span>
        </div>
        
        <div class="bench-row" id="bench-row">
            <div class="zone" style="width:85px; height:119px;" ondragover="over(event)" ondrop="drop(event, 'bench', 0)"></div>
            <div class="zone" style="width:85px; height:119px;" ondragover="over(event)" ondrop="drop(event, 'bench', 1)"></div>
            <div class="zone" style="width:85px; height:119px;" ondragover="over(event)" ondrop="drop(event, 'bench', 2)"></div>
            <div class="zone" style="width:85px; height:119px;" ondragover="over(event)" ondrop="drop(event, 'bench', 3)"></div>
            <div class="zone" style="width:85px; height:119px;" ondragover="over(event)" ondrop="drop(event, 'bench', 4)"></div>
        </div>
    </div>

    <div class="side-stack">
        <div id="discard-pile" class="zone" style="height:150px;" onclick="logDiscard()">
            <span style="color:rgba(255,255,255,0.1)">DISCARD</span>
        </div>
        <div id="deck-zone" class="deck-container" style="height:160px;">
            <div id="deck-visual"></div>
        </div>
    </div>
</div>

<div id="hand" class="hand-dock"></div>

<script>
    const cardData = [
        { name: "Dragapult ex", hp: 320, img: "https://images.pokemontcg.io/sv6/130_hires.png" },
        { name: "Drakloak", hp: 90, img: "https://images.pokemontcg.io/sv6/129_hires.png" },
        { name: "Dreepy", hp: 70, img: "https://images.pokemontcg.io/sv6/128_hires.png" }
    ];

    let state = {
        deck: [], hand: [], discard: [],
        active: null, bench: [null, null, null, null, null]
    };

    function init() {
        for(let i=0; i<60; i++) state.deck.push({...cardData[i%3], id: Math.random()});
        renderDeck();
    }

    // 🌀 物理洗牌動畫 (左右交錯)
    function startShuffle() {
        const visual = document.getElementById('deck-visual');
        const cards = visual.querySelectorAll('.deck-card');
        cards.forEach((c, i) => c.classList.add(i % 2 === 0 ? 'shf-l' : 'shf-r'));

        setTimeout(() => {
            state.deck.sort(() => Math.random() - 0.5);
            cards.forEach(c => c.classList.remove('shf-l', 'shf-r'));
            renderDeck();
        }, 1200);
    }

    function renderDeck() {
        const v = document.getElementById('deck-visual');
        v.innerHTML = "";
        for(let i=0; i<Math.min(state.deck.length, 10); i++) {
            const d = document.createElement('div');
            d.className = "deck-card";
            d.style.top = -i+"px"; d.style.left = i+"px";
            v.appendChild(d);
        }
        document.getElementById('deck-count').innerText = state.deck.length;
    }

    function draw() {
        if(state.deck.length === 0) return;
        state.hand.push(state.deck.shift());
        renderHand();
        renderDeck();
    }

    function renderHand() {
        const h = document.getElementById('hand');
        h.innerHTML = "";
        state.hand.forEach((card, i) => {
            const c = document.createElement('div');
            c.className = "card-instance hand-item";
            c.style.backgroundImage = `url(${card.img})`;
            c.draggable = true;
            c.ondragstart = (e) => e.dataTransfer.setData("handIdx", i);
            const rot = (i - (state.hand.length-1)/2) * 5;
            c.style.transform = `rotate(${rot}deg)`;
            h.appendChild(c);
        });
    }

    // 🖱️ 拖放邏輯
    function over(e) { e.preventDefault(); e.currentTarget.classList.add('hover'); }
    
    function drop(e, target, benchIdx) {
        e.preventDefault();
        e.currentTarget.classList.remove('hover');
        const handIdx = e.dataTransfer.getData("handIdx");
        const card = state.hand[handIdx];

        if(target === 'active') {
            if(state.active) state.discard.push(state.active);
            state.active = card;
        } else {
            if(state.bench[benchIdx]) state.discard.push(state.bench[benchIdx]);
            state.bench[benchIdx] = card;
        }

        state.hand.splice(handIdx, 1);
        renderHand();
        renderBoard();
        updateDiscardUI();
    }

    function renderBoard() {
        const a = document.getElementById('active-spot');
        a.innerHTML = state.active ? `<div class="card-instance" style="background-image:url(${state.active.img}); width:100%; height:100%;"><div class="hp-bar">HP ${state.active.hp}</div></div>` : "ACTIVE";
        
        const bSlots = document.querySelectorAll('#bench-row .zone');
        state.bench.forEach((card, i) => {
            bSlots[i].innerHTML = card ? `<div class="card-instance" style="background-image:url(${card.img}); width:100%; height:100%;"><div class="hp-bar">HP ${card.hp}</div></div>` : "";
        });
    }

    function updateDiscardUI() {
        const d = document.getElementById('discard-pile');
        document.getElementById('discard-count').innerText = state.discard.length;
        if(state.discard.length > 0) {
            const top = state.discard[state.discard.length-1];
            d.innerHTML = `<div class="card-instance" style="background-image:url(${top.img}); width:100%; height:100%; opacity:0.6; filter:grayscale(0.5);"></div>`;
        }
    }

    function logDiscard() {
        if(state.discard.length === 0) return;
        alert("棄牌區清單：\n" + state.discard.map(c => c.name).join("\n"));
    }

    init();
</script>
</body>
</html>
</body>
</html>
