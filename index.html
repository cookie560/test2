<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 融合對戰系統 - 正式副牌版</title>
    <style>
        :root {
            --mat-green: #558b2f;
            --ptcg-blue: #3d7dca;
            --ptcg-yellow: #ffcb05;
            --card-w: 75px;
            --card-h: 105px;
        }

        body {
            margin: 0; background: #1b1b1b; color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        /* 1. 官方標準桌墊 */
        .play-mat {
            position: relative;
            width: 960px; height: 560px;
            background-color: var(--mat-green);
            border: 6px solid #33691e; border-radius: 20px;
            margin-top: 15px; display: grid;
            grid-template-columns: 160px 1fr 160px;
            padding: 20px; gap: 15px; box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* 裝飾線條 */
        .mat-line {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 240px; height: 240px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; pointer-events: none;
        }

        /* 區域插槽 */
        .slot {
            border: 2px solid rgba(255,255,255,0.5); border-radius: 8px;
            background: rgba(0,0,0,0.1); position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .slot::after {
            content: attr(data-label); font-size: 10px; color: rgba(255,255,255,0.4);
            position: absolute; bottom: 4px; width: 100%; text-align: center;
        }

        /* 左側獎賞卡 */
        .prize-area { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 8px; }

        /* 中間戰場 */
        .battle-center { display: flex; flex-direction: column; gap: 20px; }
        .active-row { display: flex; justify-content: center; height: 160px; gap: 60px; }
        .bench-row { display: flex; justify-content: center; gap: 10px; height: 110px; }

        /* 右側功能區 */
        .side-stack { display: flex; flex-direction: column; gap: 20px; }

        /* 2. 卡牌物件 */
        .card {
            width: var(--card-w); height: var(--card-h);
            background-size: cover; background-position: center;
            border-radius: 6px; border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: grab; position: relative; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px) scale(1.05); z-index: 10; }
        .card-back { background-image: url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); }

        /* 動畫用飛出卡片 */
        .flying-card {
            position: fixed; z-index: 999; width: var(--card-w); height: var(--card-h);
            pointer-events: none; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 下方手牌區 */
        .hand-container {
            position: fixed; bottom: 0; width: 100%; height: 150px;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; gap: -10px; backdrop-filter: blur(8px);
        }
        .hand-card { margin: 0 -15px; } /* 手牌重疊感 */

        /* 按鈕控制 */
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        button {
            padding: 8px 16px; border-radius: 6px; border: none;
            background: var(--ptcg-yellow); color: #333; font-weight: bold; cursor: pointer;
        }
        #msg { color: var(--ptcg-yellow); height: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="msg">請點擊牌庫進行抽牌</div>

<div class="play-mat">
    <div class="mat-line"></div>

    <div class="prize-area">
        <div class="slot" style="width:65px; height:90px;" data-label="PRIZE"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
    </div>

    <div class="battle-center">
        <div class="active-row">
            <div class="slot" style="width:110px; height:154px;" data-label="對手出戰"></div>
            <div class="slot" id="my-active" style="width:110px; height:154px;" data-label="出戰位置" ondragover="allowDrop(event)" ondrop="dropCard(event, 'active')"></div>
        </div>
        <div class="bench-row" id="bench">
            <div class="slot" style="width:85px; height:119px;" data-label="備戰" ondragover="allowDrop(event)" ondrop="dropCard(event, 'bench')"></div>
            <div class="slot" style="width:85px; height:119px;" ondragover="allowDrop(event)" ondrop="dropCard(event, 'bench')"></div>
            <div class="slot" style="width:85px; height:119px;" ondragover="allowDrop(event)" ondrop="dropCard(event, 'bench')"></div>
            <div class="slot" style="width:85px; height:119px;" ondragover="allowDrop(event)" ondrop="dropCard(event, 'bench')"></div>
            <div class="slot" style="width:85px; height:119px;" ondragover="allowDrop(event)" ondrop="dropCard(event, 'bench')"></div>
        </div>
    </div>

    <div class="side-stack">
        <div class="slot" style="height:110px;" data-label="棄牌區"></div>
        <div class="slot" id="deck-zone" style="height:140px; border:none; background:none; cursor:pointer;" onclick="drawCard()">
            <div class="card card-back" style="position:absolute; top:5px; left:30px; z-index:1;"></div>
            <div class="card card-back" id="deck-top" style="position:absolute; top:0; left:25px; z-index:2;"></div>
            <div style="position:absolute; bottom:0; width:100%; text-align:center; font-size:12px;">牌庫: <span id="deck-count">60</span></div>
        </div>
        <button onclick="shuffleDeck()">🌀 重新洗牌</button>
    </div>
</div>

<div class="hand-container" id="hand"></div>

<script>
    // 1. 從你提供的圖片中提取的數據 (Deck List Data)
    const deckData = [
        { img: 'https://images.pokemontcg.io/sv6/130_hires.png', count: 3 }, // 多龍巴魯托ex
        { img: 'https://images.pokemontcg.io/sv6/129_hires.png', count: 4 }, // 多龍梅西亞
        { img: 'https://images.pokemontcg.io/sv6/128_hires.png', count: 4 }, // 多龍
        { img: 'https://images.pokemontcg.io/sv1/191_hires.png', count: 4 }, // 高級球
        { img: 'https://images.pokemontcg.io/sv1/194_hires.png', count: 4 }, // 嵌套球
        { img: 'https://images.pokemontcg.io/swsh8/148_hires.png', count: 2 }, // 奇巴納
        { img: 'https://images.pokemontcg.io/sm12/energy2_hires.png', count: 8 } // 能量卡 (模擬圖片總數)
    ];

    let fullDeck = [];
    let hand = [];

    // 2. 根據圖片數據生成 60 張標準牌組
    function initGame() {
        fullDeck = [];
        deckData.forEach(item => {
            for(let i=0; i<item.count; i++) {
                fullDeck.push({ img: item.img, id: Math.random() });
            }
        });
        // 補齊到 60 張 (使用圖中其他卡片模擬)
        while(fullDeck.length < 60) {
            fullDeck.push({ img: 'https://images.pokemontcg.io/swsh8/142_hires.png', id: Math.random() });
        }
        shuffleDeck();
        updateUI();
    }

    function shuffleDeck() {
        for (let i = fullDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
        }
        document.getElementById('msg').innerText = "牌組已按照副牌清單洗好！";
    }

    async function drawCard() {
        if(fullDeck.length === 0) return;
        
        const deckTop = document.getElementById('deck-top');
        const rect = deckTop.getBoundingClientRect();
        
        // 抽卡飛行動畫
        const flying = document.createElement('div');
        flying.className = "card card-back flying-card";
        flying.style.left = rect.left + "px";
        flying.style.top = rect.top + "px";
        document.body.appendChild(flying);

        const card = fullDeck.shift();
        updateUI();

        setTimeout(() => {
            flying.style.left = "50%";
            flying.style.top = "90%";
            flying.style.transform = "translate(-50%, -50%) rotate(360deg) scale(0.5)";
            flying.style.opacity = "0";
        }, 50);

        setTimeout(() => {
            document.body.removeChild(flying);
            hand.push(card);
            renderHand();
        }, 650);
    }

    function renderHand() {
        const h = document.getElementById('hand');
        h.innerHTML = "";
        hand.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = "card hand-card";
            el.style.backgroundImage = `url('${c.img}')`;
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            h.appendChild(el);
        });
    }

    function allowDrop(e) { e.preventDefault(); }

    function dropCard(e, type) {
        const idx = e.dataTransfer.getData("idx");
        const card = hand[idx];
        hand.splice(idx, 1);
        
        e.currentTarget.innerHTML = `<img src="${card.img}" style="width:100%; height:100%; border-radius:6px;">`;
        renderHand();
    }

    function updateUI() {
        document.getElementById('deck-count').innerText = fullDeck.length;
    }

    initGame();
</script>
</body>
</html>
