<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>PTCG 專業對戰模擬器</title>
<style>
    :root {
        --tcg-yellow: #ffcb05;
        --tcg-blue: #3d7dca;
        --bg-dark: #1e293b;
    }

    body { 
        margin: 0; background: #0f172a; color: white; 
        font-family: 'Segoe UI', system-ui, sans-serif;
        display: flex; flex-direction: column; align-items: center;
        overflow: hidden;
    }

    /* 戰場容器 */
    .playmat {
        width: 95vw; height: 85vh;
        background: radial-gradient(circle, #1e293b 0%, #020617 100%);
        border: 4px solid #334155; border-radius: 20px;
        display: grid;
        grid-template-columns: 120px 1fr 120px;
        grid-template-rows: 1fr 1fr 140px;
        gap: 10px; padding: 20px; box-sizing: border-box;
        margin-top: 10px;
    }

    /* 區域樣式 */
    .zone { 
        border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        position: relative; background: rgba(255,255,255,0.02);
    }

    .prizes { grid-row: 1 / 3; display: flex; flex-direction: column; gap: 5px; }
    .side-bar { grid-column: 3; display: flex; flex-direction: column; gap: 10px; }
    
    /* 對戰中心區 */
    .battle-field { grid-column: 2; display: flex; flex-direction: column; gap: 10px; }
    .active-row { height: 50%; display: flex; justify-content: space-around; align-items: center; }
    .bench-row { height: 40%; display: flex; justify-content: center; gap: 10px; }

    /* 卡牌設計 */
    .card {
        width: 80px; height: 112px;
        background: linear-gradient(135deg, #fef3c7 0%, #f59e0b 100%);
        border: 3px solid var(--tcg-yellow); border-radius: 6px;
        color: #1e293b; position: relative; cursor: grab;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 10px; font-weight: bold; overflow: hidden;
    }

    .card:hover { transform: translateY(-5px) scale(1.05); z-index: 100; }
    .card .hp { position: absolute; top: 5px; right: 5px; color: #dc2626; font-size: 12px; }
    .card .name { padding: 8px 5px 2px; border-bottom: 1px solid rgba(0,0,0,0.1); }
    
    /* 牌背樣式 */
    .card-back {
        background: var(--tcg-blue); border-color: white;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 12px; text-transform: uppercase;
    }

    /* 手牌區 */
    .hand-area { 
        grid-column: 2; display: flex; justify-content: center; gap: -20px; 
        padding: 10px; background: rgba(0,0,0,0.3); border-radius: 50px 50px 0 0;
    }

    /* 控制鈕 */
    .controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
    button {
        padding: 10px 20px; border-radius: 8px; border: none;
        background: var(--tcg-blue); color: white; font-weight: bold;
        cursor: pointer; box-shadow: 0 4px #1d4ed8;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px #1d4ed8; }
    
    #message { font-size: 18px; color: var(--tcg-yellow); margin: 5px; height: 25px; }
</style>
</head>
<body>

<div id="message">準備戰鬥！</div>

<div class="playmat">
    <div class="prizes zone" id="prizes">獎賞卡</div>

    <div class="battle-field">
        <div class="active-row">
            <div class="zone" id="enemy-active" style="width:100px; height:140px;">敵方出戰</div>
            <div class="zone" id="player-active" style="width:100px; height:140px;" ondragover="allowDrop(event)" ondrop="dropToActive(event)">我的出戰</div>
        </div>
        <div class="bench-row" id="bench">
            <div class="zone" style="width:80px; height:112px;"></div>
            <div class="zone" style="width:80px; height:112px;"></div>
            <div class="zone" style="width:80px; height:112px;"></div>
        </div>
    </div>

    <div class="side-bar">
        <div class="zone" id="deck-visual" style="height:140px; cursor:pointer;" onclick="drawCard()">
            </div>
        <div class="zone" id="discard" style="height:140px;">棄牌區</div>
    </div>

    <div class="hand-area" id="hand"></div>
</div>

<div class="controls">
    <button onclick="shuffleDeck()" style="background:#f59e0b">🌀 洗牌</button>
    <button onclick="attack()">💥 攻擊</button>
    <button onclick="endTurn()">⌛ 結束回合</button>
</div>

<script>
let deck = [];
let hand = [];
let playerActive = null;

function initGame() {
    const data = [
        { name: "皮卡丘", hp: 60, atk: 20 },
        { name: "噴火龍", hp: 180, atk: 120 },
        { name: "超夢", hp: 120, atk: 80 },
        { name: "甲賀忍蛙", hp: 130, atk: 60 },
        { name: "路卡利歐", hp: 110, atk: 70 }
    ];
    deck = [];
    for(let i=0; i<6; i++) {
        data.forEach(p => deck.push({...p, id: Math.random()}));
    }
    renderDeck();
}

function renderDeck() {
    const deckDiv = document.getElementById('deck-visual');
    deckDiv.innerHTML = `<div class="card card-back" style="position:absolute; top:0; left:15px;">Deck<br>${deck.length}</div>`;
}

async function shuffleDeck() {
    const deckDiv = document.getElementById('deck-visual');
    setMessage("正在洗牌...");
    
    // 視覺特效：牌組抖動
    deckDiv.style.animation = "shake 0.5s infinite";
    
    // Fisher-Yates 洗牌
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }

    await new Promise(r => setTimeout(r, 1000));
    deckDiv.style.animation = "";
    setMessage("洗牌完成！");
    renderDeck();
}

function drawCard() {
    if (deck.length === 0) return;
    const card = deck.shift();
    hand.push(card);
    renderHand();
    renderDeck();
    setMessage(`抽到了 ${card.name}`);
}

function renderHand() {
    const handDiv = document.getElementById('hand');
    handDiv.innerHTML = "";
    hand.forEach((card, index) => {
        const div = document.createElement('div');
        div.className = "card";
        div.draggable = true;
        div.innerHTML = `<div class="name">${card.name}</div><div class="hp">${card.hp} HP</div>`;
        div.ondragstart = (e) => e.dataTransfer.setData("index", index);
        handDiv.appendChild(div);
    });
}

function allowDrop(e) { e.preventDefault(); }

function dropToActive(e) {
    e.preventDefault();
    const index = e.dataTransfer.getData("index");
    if (playerActive) return setMessage("出戰位置已滿！");
    
    playerActive = hand[index];
    hand.splice(index, 1);
    
    const zone = document.getElementById('player-active');
    zone.innerHTML = `<div class="card" style="width:100px; height:140px; font-size:14px;">
        <div class="name">${playerActive.name}</div>
        <div class="hp">${playerActive.hp} HP</div>
    </div>`;
    renderHand();
}

function setMessage(m) { document.getElementById('message').innerText = m; }

// 抖動動畫 CSS
const style = document.createElement('style');
style.innerHTML = `
    @keyframes shake {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(5deg); }
        75% { transform: rotate(-5deg); }
        100% { transform: rotate(0deg); }
    }
`;
document.head.appendChild(style);

initGame();
</script>

</body>
</html>
