<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 對戰模擬器 - 多龍巴魯托 ex 構築版</title>
    <style>
        :root {
            --mat-green: #2e7d32;
            --ptcg-blue: #1976d2;
            --ptcg-gold: #ffca28;
            --card-w: 72px;
            --card-h: 100px;
        }

        body {
            margin: 0; background: #121212; color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        /* 1. 對戰桌墊設計 */
        .play-mat {
            position: relative; width: 950px; height: 580px;
            background-color: var(--mat-green);
            border: 5px solid #1b5e20; border-radius: 25px;
            margin-top: 10px; display: grid;
            grid-template-columns: 160px 1fr 160px;
            padding: 25px; gap: 15px; box-sizing: border-box;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        /* 插槽樣式 */
        .slot {
            border: 2px solid rgba(255,255,255,0.4); border-radius: 8px;
            background: rgba(0,0,0,0.15); position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .slot::after {
            content: attr(data-label); font-size: 10px; color: rgba(255,255,255,0.4);
            position: absolute; bottom: 5px; width: 100%; text-align: center;
        }

        /* 佈局區域 */
        .prize-area { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 10px; }
        .battle-center { display: flex; flex-direction: column; gap: 30px; }
        .active-row { display: flex; justify-content: center; height: 160px; }
        .bench-row { display: flex; justify-content: center; gap: 12px; height: 110px; }
        .side-stack { display: flex; flex-direction: column; gap: 20px; }

        /* 2. 卡牌設計 */
        .card {
            width: var(--card-w); height: var(--card-h);
            background-color: #eee; border-radius: 6px; border: 2px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            cursor: grab; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #333; font-size: 10px; font-weight: bold;
        }
        .card-back { background: var(--ptcg-blue); color: white; border-color: white; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        /* 抽牌飛行的動畫 */
        .flying-card {
            position: fixed; z-index: 1000; pointer-events: none;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 手牌區 */
        .hand-container {
            position: fixed; bottom: 0; width: 100%; height: 140px;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center;
            align-items: center; gap: 5px; backdrop-filter: blur(10px);
        }
        .hand-card { margin: 0 -5px; }

        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--ptcg-gold); color: #212121; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px #c6a700;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #c6a700; }
        #log { color: var(--ptcg-gold); margin-bottom: 5px; height: 20px; }
    </style>
</head>
<body>

<div id="log">系統準備就緒</div>

<div class="play-mat">
    <div class="prize-area">
        <div class="slot" style="width:65px; height:90px;" data-label="PRIZE"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
        <div class="slot" style="width:65px; height:90px;"></div>
    </div>

    <div class="battle-center">
        <div class="active-row">
            <div class="slot" id="my-active" style="width:115px; height:160px; border-color:var(--ptcg-gold);" data-label="出戰位置" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
        </div>
        <div class="bench-row" id="bench">
            <div class="slot" style="width:80px; height:112px;" data-label="備戰" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
            <div class="slot" style="width:80px; height:112px;" ondragover="allowDrop(event)" ondrop="dropCard(event)"></div>
        </div>
    </div>

    <div class="side-stack">
        <div class="slot" style="height:100px;" data-label="棄牌區"></div>
        <div class="slot" id="deck-zone" style="height:150px; border:none; background:none; cursor:pointer;" onclick="drawCard()">
            <div class="card card-back" id="deck-top" style="position:absolute; top:0; left:30px; z-index:2;">BACK</div>
            <div style="position:absolute; bottom:0; width:100%; text-align:center;">牌庫: <span id="count">60</span></div>
        </div>
        <button onclick="shuffleDeck()">🌀 洗牌</button>
    </div>
</div>

<div class="hand-container" id="hand"></div>

<script>
    // 載入你提供的特定卡表
    const deckList = [
        { name: "Dreepy", count: 4 }, { name: "Drakloak", count: 4 }, { name: "Dragapult ex", count: 3 },
        { name: "Budew", count: 2 }, { name: "Munkidori", count: 2 }, { name: "Meowth ex", count: 2 },
        { name: "Lillie's Clefairy ex", count: 1 }, { name: "Bloodmoon Ursaluna ex", count: 1 },
        { name: "Fezandipiti ex", count: 1 }, { name: "Shaymin", count: 1 }, { name: "Moltres", count: 1 },
        { name: "Latias ex", count: 1 }, { name: "Lillie's Determination", count: 4 },
        { name: "Boss's Orders", count: 3 }, { name: "Crispin", count: 2 }, { name: "Judge", count: 1 },
        { name: "Rosa's Encouragement", count: 1 }, { name: "Poké Pad", count: 4 },
        { name: "Buddy-Buddy Poffin", count: 4 }, { name: "Ultra Ball", count: 4 },
        { name: "Night Stretcher", count: 2 }, { name: "Unfair Stamp", count: 1 },
        { name: "Area Zero Underdepths", count: 2 }, { name: "Psychic Energy", count: 3 },
        { name: "Darkness Energy", count: 3 }, { name: "Fire Energy", count: 3 }
    ];

    let deck = [];
    let hand = [];

    function init() {
        deck = [];
        deckList.forEach(item => {
            for(let i=0; i<item.count; i++) {
                deck.push({ name: item.name, id: Math.random() });
            }
        });
        shuffleDeck();
        updateUI();
    }

    function shuffleDeck() {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        document.getElementById('log').innerText = "多龍巴魯托牌組已洗好！";
    }

    async function drawCard() {
        if(deck.length === 0) return;
        const deckTop = document.getElementById('deck-top');
        const rect = deckTop.getBoundingClientRect();
        
        const flying = document.createElement('div');
        flying.className = "card card-back flying-card";
        flying.innerText = "POKÉ";
        flying.style.left = rect.left + "px";
        flying.style.top = rect.top + "px";
        document.body.appendChild(flying);

        const card = deck.shift();
        updateUI();

        setTimeout(() => {
            flying.style.left = "50%";
            flying.style.top = "90%";
            flying.style.transform = "translate(-50%, -50%) rotate(360deg) scale(0.6)";
            flying.style.opacity = "0";
        }, 50);

        setTimeout(() => {
            document.body.removeChild(flying);
            hand.push(card);
            renderHand();
        }, 650);
    }

    function renderHand() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = "";
        hand.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = "card hand-card";
            el.innerHTML = `<div style="padding:5px">${c.name}</div>`;
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            handDiv.appendChild(el);
        });
    }

    function allowDrop(e) { e.preventDefault(); }
    function dropCard(e) {
        const idx = e.dataTransfer.getData("idx");
        const card = hand[idx];
        hand.splice(idx, 1);
        e.currentTarget.innerHTML = `<div class="card" style="width:100%; height:100%; border:none;">${card.name}</div>`;
        renderHand();
    }

    function updateUI() { document.getElementById('count').innerText = deck.length; }

    init();
</script>
</body>
</html>
