<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢卡牌洗牌系統</title>
    <style>
        :root {
            --card-width: 150px;
            --card-height: 210px;
            --primary-color: #ffcb05;
            --secondary-color: #3d7dca;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        h1 { margin-bottom: 20px; color: var(--primary-color); text-shadow: 2px 2px #3d7dca; }

        /* 牌組容器 */
        .deck-container {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            perspective: 1000px;
            margin-bottom: 40px;
        }

        /* 單張卡牌樣式 */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            border: 4px solid #fff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            user-select: none;
        }

        /* 模擬卡牌背面 */
        .card::after {
            content: "POKÉMON";
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
        }

        .card-info {
            text-align: center;
            pointer-events: none;
        }

        .card-name { font-weight: bold; margin-bottom: 5px; }
        .card-type { font-size: 0.8rem; opacity: 0.8; }

        /* 洗牌中的狀態 */
        .shuffling .card {
            transform: translate(var(--tx), var(--ty)) rotate(var(--tr));
        }

        /* 按鈕樣式 */
        .controls {
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--primary-color);
            color: var(--secondary-color);
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px #c7a008;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px #c7a008;
        }

        button:disabled {
            background-color: #888;
            color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>卡牌洗牌模擬器</h1>

    <div class="deck-container" id="deck">
        </div>

    <div class="controls">
        <button id="shuffleBtn" onclick="handleShuffle()">開始洗牌！</button>
    </div>

    <script>
        const cardNames = ["皮卡丘", "噴火龍", "超夢", "甲賀忍蛙", "路卡利歐", "伊布", "耿鬼", "烈空坐"];
        const types = ["電", "火", "超能力", "水", "格鬥", "一般", "幽靈", "龍"];
        const deckContainer = document.getElementById('deck');
        const shuffleBtn = document.getElementById('shuffleBtn');
        let cardsData = [];

        // 初始化卡牌
        function initDeck() {
            deckContainer.innerHTML = '';
            cardsData = cardNames.map((name, i) => ({
                id: i,
                name: name,
                type: types[i]
            }));

            cardsData.forEach((data, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.id = `card-${index}`;
                // 初始堆疊效果 (微小的位移讓它看起來像一疊牌)
                cardEl.style.zIndex = index;
                cardEl.style.transform = `translate(${index * 0.5}px, ${-index * 0.5}px)`;
                
                cardEl.innerHTML = `
                    <div class="card-info">
                        <div class="card-name">${data.name}</div>
                        <div class="card-type">${data.type}屬性</div>
                    </div>
                `;
                deckContainer.appendChild(cardEl);
            });
        }

        // Fisher-Yates 洗牌演算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function handleShuffle() {
            shuffleBtn.disabled = true;
            const cards = document.querySelectorAll('.card');
            
            // 1. 噴散動畫
            deckContainer.classList.add('shuffling');
            cards.forEach((card, i) => {
                const tx = (Math.random() - 0.5) * 500;
                const ty = (Math.random() - 0.5) * 400;
                const tr = (Math.random() - 0.5) * 720;
                card.style.setProperty('--tx', `${tx}px`);
                card.style.setProperty('--ty', `${ty}px`);
                card.style.setProperty('--tr', `${tr}deg`);
            });

            // 等待動畫噴散完成
            await new Promise(resolve => setTimeout(resolve, 700));

            // 2. 核心洗牌 (邏輯)
            shuffleArray(cardsData);

            // 3. 收回動畫 (根據新順序更新 z-index)
            deckContainer.classList.remove('shuffling');
            cardsData.forEach((data, index) => {
                const cardEl = document.getElementById(`card-${data.id}`);
                cardEl.style.zIndex = index;
                cardEl.style.transform = `translate(${index * 0.5}px, ${-index * 0.5}px) rotate(0deg)`;
            });

            setTimeout(() => {
                shuffleBtn.disabled = false;
            }, 600);
        }

        initDeck();
    </script>
</body>
</html>
