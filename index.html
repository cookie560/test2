<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 官方標準規格對戰</title>
    <style>
        :root {
            --mat-green: #4caf50;
            --slot-line: rgba(255, 255, 255, 0.7);
            --card-w: 70px;
            --card-h: 98px;
        }

        body {
            margin: 0; background-color: #222;
            display: flex; flex-direction: column; align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* 1. 官方標準桌墊佈局 */
        .play-mat {
            position: relative;
            width: 900px; height: 550px;
            background-color: var(--mat-green);
            border: 6px solid #388e3c; border-radius: 15px;
            margin-top: 20px; display: grid;
            grid-template-columns: 150px 1fr 150px;
            padding: 20px; gap: 10px; box-sizing: border-box;
        }

        /* 精靈球中央線 */
        .center-circle {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 260px; height: 260px; border: 4px solid rgba(255,255,255,0.4);
            border-radius: 50%; pointer-events: none;
        }

        /* 2. 區域插槽系統 */
        .slot {
            border: 2px solid var(--slot-line); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            position: relative; background: rgba(0,0,0,0.05);
        }
        .slot::after {
            content: attr(data-label); font-size: 10px; color: rgba(255,255,255,0.5);
            position: absolute; bottom: 2px;
        }

        /* 左側獎賞卡 (2x3) */
        .prize-area { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 5px; }

        /* 中間戰場 */
        .battle-area { display: flex; flex-direction: column; gap: 30px; }
        .active-spot-row { display: flex; justify-content: center; height: 160px; }
        .bench-row { display: flex; justify-content: center; gap: 8px; height: 110px; }

        /* 右側：牌組與棄牌區 */
        .side-area { display: flex; flex-direction: column; gap: 15px; }

        /* 3. 卡牌物件 */
        .card {
            width: var(--card-w); height: var(--card-h);
            background-size: cover; background-position: center;
            border-radius: 5px; border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: grab; position: absolute; transition: transform 0.3s;
        }
        .card-back { background-image: url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); }

        /* 抽牌動畫 */
        .flying {
            position: fixed; z-index: 1000; pointer-events: none;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 下方手牌區 */
        .hand-container {
            position: fixed; bottom: 0; width: 100%; height: 140px;
            background: rgba(0,0,0,0.4); display: flex; justify-content: center;
            align-items: center; gap: 5px; backdrop-filter: blur(5px);
        }

        /* 按鈕 */
        .controls { position: absolute; top: 10px; right: 10px; }
        button { padding: 10px 15px; border-radius: 5px; border: none; background: #ffcb05; color: #3d7dca; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="play-mat">
    <div class="center-circle"></div>

    <div class="prize-area">
        <div class="slot" style="width:60px; height:85px;" data-label="獎賞卡"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
    </div>

    <div class="battle-area">
        <div class="active-spot-row">
            <div class="slot" id="active-spot" style="width:110px; height:154px;" data-label="出戰寶可夢" ondragover="allowDrop(event)" ondrop="dropToActive(event)"></div>
        </div>
        <div class="bench-row">
            <div class="slot" style="width:80px; height:112px;" data-label="備戰"></div>
            <div class="slot" style="width:80px; height:112px;"></div>
            <div class="slot" style="width:80px; height:112px;"></div>
            <div class="slot" style="width:80px; height:112px;"></div>
            <div class="slot" style="width:80px; height:112px;"></div>
        </div>
    </div>

    <div class="side-area">
        <div class="slot" style="height:120px;" data-label="棄牌區"></div>
        <div class="slot" id="deck-zone" style="height:150px; background:none; border:none; cursor:pointer;" onclick="drawCard()">
            <div class="card card-back" style="top:5px; left:35px; z-index:1;"></div>
            <div class="card card-back" id="deck-top" style="top:0; left:30px; z-index:2;"></div>
            <div style="position:absolute; bottom:0; width:100%; text-align:center; font-size:12px; font-weight:bold;">牌庫: <span id="count">60</span></div>
        </div>
        <button onclick="shuffleDeck()">🌀 洗牌</button>
    </div>
</div>

<div class="hand-container" id="hand"></div>

<script>
    let deck = [];
    let hand = [];

    // 正式規則：60張牌組
    function init() {
        const sampleCards = [
            'https://images.pokemontcg.io/sv1/1_hires.png',
            'https://images.pokemontcg.io/sm12/energy2_hires.png',
            'https://images.pokemontcg.io/swsh8/142_hires.png'
        ];
        deck = [];
        for(let i=0; i<60; i++) {
            deck.push(sampleCards[i % sampleCards.length]);
        }
        updateCount();
    }

    function updateCount() { document.getElementById('count').innerText = deck.length; }

    // Fisher-Yates 洗牌 (正式規則必備)
    function shuffleDeck() {
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        alert("牌組已按照正式規則完成洗牌！");
    }

    async function drawCard() {
        if(deck.length === 0) return;
        
        const deckTop = document.getElementById('deck-top');
        const rect = deckTop.getBoundingClientRect();
        
        // 1. 動畫卡片
        const flying = document.createElement('div');
        flying.className = "card card-back flying";
        flying.style.left = rect.left + "px";
        flying.style.top = rect.top + "px";
        document.body.appendChild(flying);

        const cardImg = deck.shift();
        updateCount();

        // 2. 飛向手牌軌跡 (模擬參考圖的曲線)
        setTimeout(() => {
            flying.style.left = "50%";
            flying.style.top = "90%";
            flying.style.transform = "translate(-50%, -50%) rotate(360deg)";
            flying.style.opacity = "0";
        }, 50);

        // 3. 進入手牌數據
        setTimeout(() => {
            document.body.removeChild(flying);
            hand.push(cardImg);
            renderHand();
        }, 650);
    }

    function renderHand() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = "";
        hand.forEach((img, i) => {
            const el = document.createElement('div');
            el.className = "card";
            el.style.backgroundImage = `url('${img}')`;
            el.style.position = "static";
            el.draggable = true;
            el.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            handDiv.appendChild(el);
        });
    }

    function allowDrop(e) { e.preventDefault(); }
    function dropToActive(e) {
        const idx = e.dataTransfer.getData("idx");
        const img = hand[idx];
        hand.splice(idx, 1);
        e.currentTarget.innerHTML = `<img src="${img}" style="width:100%; height:100%; border-radius:6px;">`;
        renderHand();
    }

    init();
</script>
</body>
</html>
    initHand();
</script>
</body>
</html>
