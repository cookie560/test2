<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <button onclick="startShuffle()">🌀 洗牌</button>
    <button onclick="drawCard()">📥 抽卡</button>
    <button onclick="attack()">⚔️ 攻擊</button>
    <div>牌庫: <span id="deck-count">60</span></div>
</div>

<div class="battle-field">

    <!-- 對手 -->
    <div id="opponent-active" class="zone big"></div>

    <!-- 玩家 -->
    <div class="player-area">
        <div class="zone big dropzone" data-zone="active"></div>
        <div class="bench">
            <div class="zone dropzone" data-zone="bench"></div>
            <div class="zone dropzone" data-zone="bench"></div>
            <div class="zone dropzone" data-zone="bench"></div>
        </div>
    </div>

    <!-- 牌庫 -->
    <div id="deck-visual" class="deck"></div>

</div>

<div id="hand" class="hand"></div>

<div id="log" class="log"></div>

<script src="main.js"></script>
</body>
</html>
