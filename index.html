<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Elite - Final Fix</title>
    <style>
        :root {
            --ptcg-blue: #1b3664;
            --ptcg-gold: #ffcb05;
            --live-blue: #00d2ff;
            --energy-color: #ff4ed2;
            --card-w: 85px;
            --card-h: 119px;
        }

        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* 3D 舞台 */
        .arena { perspective: 1200px; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a1a 0%, #000 100%); }
        .board-3d { width: 1000px; height: 600px; transform: rotateX(15deg); display: grid; grid-template-columns: 180px 1fr 180px; gap: 20px; }

        /* 區域與格子 */
        .slot { 
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px; 
            background: rgba(255,255,255,0.02); display: flex; align-items: center; 
            justify-content: center; position: relative; transition: 0.2s;
        }
        .slot.hover { border-color: var(--ptcg-gold); background: rgba(255,203,5,0.1); transform: scale(1.05); }

        .active-area { width: 160px; height: 220px; border-style: solid; border-color: var(--live-blue); }
        .bench-container { display: flex; gap: 10px; margin-top: 30px; justify-content: center; }
        .bench-slot { width: 100px; height: 140px; }

        /* 卡牌外觀 */
        .card-entity { width: 100%; height: 100%; border-radius: 8px; border: 2px solid white; background-size: cover; position: relative; pointer-events: none; box-shadow: 0 4px 8px #000; }
        .hand-card { width: var(--card-w); height: var(--card-h); cursor: grab; pointer-events: all !important; transition: 0.3s; margin-left: -30px; }
        .hand-card:hover { transform: translateY(-80px) scale(1.4) !important; z-index: 100; }

        /* 動畫 */
        @keyframes energy-fly { 0% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(2); opacity: 0; } }
        .energy-particle { position: fixed; width: 20px; height: 20px; background: var(--energy-color); border-radius: 50%; box-shadow: 0 0 15px var(--energy-color); z-index: 2000; pointer-events: none; }
        @keyframes riffle { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-20px)} }
        .shuffling { animation: riffle 0.3s infinite; }

        /* UI */
        .hand { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; height: 150px; }
        .log { position: fixed; left: 20px; bottom: 20px; width: 200px; height: 120px; background: rgba(0,0,0,0.7); padding: 10px; font-size: 11px; overflow-y: auto; border-radius: 8px; pointer-events: none; }
        .side-btns { position: fixed; right: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #222; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .energy-badge { position: absolute; top: -10px; right: -10px; background: var(--energy-color); border: 2px solid #fff; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="arena">
    <div id="main-board" class="board-3d">
        <div id="prize-zone" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px;"></div>

        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="active-slot" class="slot active-area" 
                 ondragover="allowDrop(event)" ondragleave="leaveSlot(event)" ondrop="handleDrop(event, 'active', 0)">
                <div class="content" style="width:120px; height:168px;"></div>
            </div>

            <div class="bench-container">
                <div id="bench-0" class="slot bench-slot" ondragover="allowDrop(event)" ondragleave="leaveSlot(event)" ondrop="handleDrop(event, 'bench', 0)"></div>
                <div id="bench-1" class="slot bench-slot" ondragover="allowDrop(event)" ondragleave="leaveSlot(event)" ondrop="handleDrop(event, 'bench', 1)"></div>
                <div id="bench-2" class="slot bench-slot" ondragover="allowDrop(event)" ondragleave="leaveSlot(event)" ondrop="handleDrop(event, 'bench', 2)"></div>
                <div id="bench-3" class="slot bench-slot" ondragover="allowDrop(event)" ondragleave="leaveSlot(event)" ondrop="handleDrop(event, 'bench', 3)"></div>
                <div id="bench-4" class="slot bench-slot" ondragover="allowDrop(event)" ondragleave="leaveSlot(event)" ondrop="handleDrop(event, 'bench', 4)"></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:flex-end; padding:20px;">
            <div id="deck-stack" style="position:relative; height:150px; cursor:pointer;" onclick="drawCard()"></div>
        </div>
    </div>
</div>

<div class="log" id="game-log"></div>
<div class="side-btns">
    <button class="btn" onclick="shuffle()">🌀 SHUFFLE</button>
    <button id="e-btn" class="btn" style="color:var(--energy-color)" onclick="doEnergyAnim()">🔋 ENERGY</button>
    <button class="btn" style="background:#600;" onclick="attack()">⚔️ ATTACK</button>
</div>
<div id="player-hand" class="hand"></div>

<script>
    const CARDS = [
        { name: "Dragapult ex", stage: 2, hp: 320, img: "https://images.pokemontcg.io/sv6/130_hires.png" },
        { name: "Drakloak", stage: 1, hp: 90, img: "https://images.pokemontcg.io/sv6/129_hires.png" },
        { name: "Dreepy", stage: 0, hp: 70, img: "https://images.pokemontcg.io/sv6/128_hires.png" }
    ];

    let state = { deck: [], hand: [], active: null, bench: [null,null,null,null,null], prizes: 6, oppHp: 320 };

    function init() {
        for(let i=0; i<60; i++) state.deck.push({...CARDS[i%3], id: Math.random()});
        state.deck.sort(()=>Math.random()-0.5);
        for(let i=0; i<7; i++) state.hand.push(state.deck.shift());
        renderAll();
        addLog("Game Ready. Bench Fixed.");
    }

    // 核心拖放邏輯
    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('hover'); }
    function leaveSlot(e) { e.currentTarget.classList.remove('hover'); }

    function handleDrop(e, type, index) {
        e.preventDefault();
        e.currentTarget.classList.remove('hover');
        const handIdx = e.dataTransfer.getData("text");
        if(handIdx === "") return;

        const card = state.hand[parseInt(handIdx)];
        
        if(type === 'active') {
            if(state.active && card.stage > state.active.stage) {
                state.active = { ...card, energy: state.active.energy, curHp: card.hp };
                addLog("Evolved Active!");
            } else {
                state.active = { ...card, energy: 0, curHp: card.hp };
                addLog("Played to Active.");
            }
        } else {
            const currentBench = state.bench[index];
            if(currentBench && card.stage > currentBench.stage) {
                state.bench[index] = { ...card, energy: currentBench.energy, curHp: card.hp };
                addLog(`Evolved Bench ${index}!`);
            } else {
                state.bench[index] = { ...card, energy: 0, curHp: card.hp };
                addLog(`Played to Bench ${index}.`);
            }
        }

        state.hand.splice(handIdx, 1);
        renderAll();
    }

    // 渲染函數
    function renderAll() {
        // 出戰位
        const actCont = document.querySelector('#active-slot .content');
        actCont.innerHTML = state.active ? createCardHTML(state.active) : "";

        // 備戰位 (精確 ID 渲染)
        state.bench.forEach((c, i) => {
            const slot = document.getElementById(`bench-${i}`);
            slot.innerHTML = c ? createCardHTML(c) : "";
        });

        // 手牌
        const handDiv = document.getElementById('player-hand');
        handDiv.innerHTML = "";
        state.hand.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = "card-entity hand-card";
            div.style.backgroundImage = `url(${c.img})`;
            div.draggable = true;
            div.ondragstart = (e) => e.dataTransfer.setData("text", i);
            handDiv.appendChild(div);
        });

        // 獎賞與牌組
        const pz = document.getElementById('prize-zone');
        pz.innerHTML = "";
        for(let i=0; i<state.prizes; i++) pz.innerHTML += `<div class="slot" style="height:70px;"><div class="card-entity" style="background:#1b3664"></div></div>`;
        
        const ds = document.getElementById('deck-stack');
        ds.innerHTML = "";
        for(let i=0; i<Math.min(state.deck.length, 5); i++) ds.innerHTML += `<div class="card-entity" style="position:absolute; background:#1b3664; top:-${i*2}px; left:${i}px; width:80px; height:110px;"></div>`;
    }

    function createCardHTML(c) {
        return `<div class="card-entity" style="background-image:url(${c.img})">
            <div class="energy-badge">${c.energy || 0}</div>
        </div>`;
    }

    // 動畫與動作
    function doEnergyAnim() {
        if(!state.active) return;
        const btn = document.getElementById('e-btn').getBoundingClientRect();
        const target = document.getElementById('active-slot').getBoundingClientRect();
        const p = document.createElement('div');
        p.className = "energy-particle";
        p.style.left = btn.left + "px"; p.style.top = btn.top + "px";
        p.style.setProperty('--tx', (target.left - btn.left + 70) + "px");
        p.style.setProperty('--ty', (target.top - btn.top + 100) + "px");
        p.style.animation = "energy-fly 0.5s forwards";
        document.body.appendChild(p);
        setTimeout(() => { p.remove(); state.active.energy++; renderAll(); }, 500);
    }

    function shuffle() {
        const stack = document.getElementById('deck-stack');
        stack.classList.add('shuffling');
        setTimeout(() => { 
            state.deck.sort(()=>Math.random()-0.5); 
            stack.classList.remove('shuffling'); 
            addLog("Shuffled.");
        }, 1000);
    }

    function drawCard() { if(state.deck.length > 0) { state.hand.push(state.deck.shift()); renderAll(); } }
    
    function attack() {
        if(!state.active || state.active.energy < 2) return addLog("No Energy!");
        state.oppHp -= 200;
        if(state.oppHp <= 0) { state.oppHp = 320; state.prizes--; addLog("K.O.!"); }
        renderAll();
    }

    function addLog(m) { const l = document.getElementById('game-log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    init();
</script>
</body>
</html>
