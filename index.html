<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>PTCG 正式副牌規格系統 (還原版)</title>
<style>
    /* 專業玻璃擬態與正式佈局 */
    :root {
        --deck-bg: #e2e8f0; /* 圖片的背景色 */
        --card-w: 110px;
        --card-h: 154px;
    }

    body { 
        margin: 0; background: #0f172a; color: white; 
        font-family: 'Segoe UI', Tahoma, sans-serif;
        display: flex; flex-direction: column; align-items: center;
        overflow-x: hidden; min-height: 100vh;
    }

    /* 正式副牌展示區 */
    .deck-list-mat {
        width: 1000px; height: 600px;
        background-color: var(--deck-bg);
        border: 4px solid #334155; border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 15px; padding: 20px; box-sizing: border-box;
        margin-top: 20px;
    }

    /* 卡牌容器 */
    .card-slot { position: relative; }

    /* 卡牌物件 (與圖片規格一致) */
    .card {
        width: 100%; height: 100%;
        background-size: cover; border-radius: 6px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        transition: transform 0.2s cubic-bezier(0.19, 1, 0.22, 1);
        cursor: pointer;
    }
    .card:hover { transform: translateY(-10px) scale(1.05); z-index: 10; }

    /* 正式規則：張數顯示器 (完全還原圖片) */
    .card-count {
        position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: #ecc94b; /* 金黃色數字 */
        padding: 5px 12px; border-radius: 20px;
        font-weight: 900; font-size: 16px; min-width: 30px; text-align: center;
        border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    /* 下方控制區 */
    .controls { margin-top: 40px; display: flex; gap: 20px; }
    button {
        padding: 15px 30px; border-radius: 12px; border: none;
        background: #ecc94b; color: #1e293b; font-weight: bold;
        cursor: pointer; box-shadow: 0 6px #b48a04; font-size: 18px;
    }
    button:active { transform: translateY(3px); box-shadow: 0 3px #b48a04; }

    #message { font-size: 20px; color: #ecc94b; height: 30px; margin-top: 20px; }
</style>
</head>

<script>
    // 正式規則：將圖片中的副牌數據化
    const deckData = [
        // 第一行
        { img: 'https://images.pokemontcg.io/sv1/1_hires.png', name: '妙蛙種子', type: '基礎' },
        { img: 'https://images.pokemontcg.io/sv1/4_hires.png', name: '小火龍', type: '基礎' },
        { img: 'https://images.pokemontcg.io/sv1/7_hires.png', name: '傑尼龜', type: '基礎' },
        { img: 'https://images.pokemontcg.io/sm12/energy2_hires.png', name: '能量A', type: '能量' },
        // ...這裡省略完整60張的輸入，以下用樣板模擬

    ];
    let fullDeck = [];

    // 初始化：根據圖片張數建立60張牌組
    function init() {
        // 模擬完整數據，這是一個標準的60張牌組
        const types = [
            'https://images.pokemontcg.io/sv1/1_hires.png',
            'https://images.pokemontcg.io/sv1/4_hires.png',
            'https://images.pokemontcg.io/sm12/energy2_hires.png',
            'https://images.pokemontcg.io/sv1/191_hires.png',
            'https://images.pokemontcg.io/swsh8/142_hires.png',
            'https://images.pokemontcg.io/swsh8/148_hires.png'
        ];
        fullDeck = [];
        for(let i=0; i<60; i++) {
            fullDeck.push(types[i % types.length]);
        }
    }

    // 正式洗牌 (Fisher-Yates)
    function shuffleDeck() {
        for (let i = fullDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
        }
        setMessage("✅ 副牌已洗牌！(Fisher-Yates 演算法)");
    }

    // 隨機抽一張
    function drawOneCard() {
        if(fullDeck.length === 0) return setMessage("❗ 牌組沒牌了");
        const cardImg = fullDeck.shift();
        const msgArea = document.getElementById('message');
        msgArea.innerHTML = `<div>📥 抽到一張牌：</div><img src="${cardImg}" style="width:70px; margin-top:10px;">`;
    }

    function setMessage(msg) { document.getElementById('message').innerText = msg; }

    init();
</script>
