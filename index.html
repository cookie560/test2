<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 官方規格對戰模擬器</title>
    <style>
        :root {
            --ptcg-yellow: #ffcb05;
            --ptcg-blue: #3d7dca;
            --field-border: rgba(255, 255, 255, 0.2);
            --card-w: 75px;
            --card-h: 105px;
        }

        body {
            margin: 0; background: #121a2a; color: white;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; height: 100vh;
        }

        /* 官方風格場地佈置 */
        .play-field {
            width: 980px; height: 580px;
            background: #1a2438; border: 3px solid #334155;
            border-radius: 15px; margin-top: 20px;
            display: grid;
            grid-template-columns: 140px 1fr 140px;
            padding: 20px; gap: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* 區域通用樣式 */
        .slot {
            border: 2px solid var(--field-border);
            border-radius: 8px; background: rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.3s;
        }
        .slot::after {
            content: attr(data-label); font-size: 10px; 
            color: rgba(255,255,255,0.2); position: absolute;
        }

        /* 獎賞卡區 (左側 2x3) */
        .prizes-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(3, 1fr); gap: 5px;
        }

        /* 中間對戰與備戰 */
        .center-field { display: flex; flex-direction: column; gap: 20px; }
        .active-area { display: flex; justify-content: center; gap: 60px; height: 160px; }
        .bench-area { display: flex; justify-content: center; gap: 10px; height: 120px; }

        /* 右側功能區 */
        .side-stack { display: flex; flex-direction: column; gap: 20px; }

        /* 卡牌設計 (仿官方規格) */
        .card {
            width: var(--card-w); height: var(--card-h);
            background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%);
            border: 3px solid var(--ptcg-yellow); border-radius: 6px;
            color: #1e293b; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            cursor: grab; overflow: hidden;
        }
        .card .hp-row { display: flex; justify-content: space-between; padding: 5px; font-weight: bold; font-size: 10px; }
        .card .atk-box { font-size: 9px; padding: 5px; margin-top: 10px; border-top: 1px solid #ddd; }
        
        .card-back { background: var(--ptcg-blue); border-color: #fff; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* 抽牌動畫 */
        .flying { position: fixed; z-index: 999; pointer-events: none; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        /* 下方手牌區 */
        .hand-bar {
            position: fixed; bottom: 0; width: 100%; height: 140px;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; gap: 10px; backdrop-filter: blur(10px);
        }

        button {
            padding: 8px 16px; border-radius: 5px; border: none;
            background: var(--ptcg-blue); color: white; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="msg" style="margin-top:10px; color:var(--ptcg-yellow)">請點擊牌庫進行抽牌</div>

<div class="play-field">
    <div class="prizes-grid">
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
    </div>

    <div class="center-field">
        <div class="active-area">
            <div class="slot" style="width:100px; height:140px;" data-label="敵方出戰"></div>
            <div class="slot" id="my-active" style="width:100px; height:140px;" data-label="出戰寶可夢" ondragover="event.preventDefault()" ondrop="dropToActive(event)"></div>
        </div>
        <div class="bench-area" id="bench">
            <div class="slot" style="width:85px; height:115px;" data-label="備戰"></div>
            <div class="slot" style="width:85px; height:115px;" data-label="備戰"></div>
            <div class="slot" style="width:85px; height:115px;" data-label="備戰"></div>
            <div class="slot" style="width:85px; height:115px;" data-label="備戰"></div>
            <div class="slot" style="width:85px; height:115px;" data-label="備戰"></div>
        </div>
    </div>

    <div class="side-stack">
        <div class="slot" style="height:120px; border-style:solid;" data-label="棄牌區"></div>
        <div class="slot" id="deck-btn" style="height:120px; cursor:pointer; background:var(--ptcg-blue);" onclick="drawCard()">
            <div class="card card-back" style="width:70px; height:95px;">DECK</div>
        </div>
        <button onclick="shuffleDeck()">洗牌</button>
    </div>
</div>

<div class="hand-bar" id="hand"></div>

<script>
    let deck = [];
    let hand = [];

    // 初始化牌組 (模擬 60 張)
    function init() {
        const pool = [
            { n: "皮卡丘V", hp: 200, atk: "120" },
            { n: "噴火龍ex", hp: 330, atk: "330" },
            { n: "超夢", hp: 120, atk: "50" },
            { n: "捷拉奧拉", hp: 210, atk: "190" }
        ];
        for(let i=0; i<60; i++) {
            deck.push({...pool[i % pool.length], id: i});
        }
        shuffleArray(deck);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    async function drawCard() {
        if (deck.length === 0) return;
        
        // 飛行動畫
        const deckBtn = document.getElementById('deck-btn');
        const rect = deckBtn.getBoundingClientRect();
        const flying = document.createElement('div');
        flying.className = "card card-back flying";
        flying.style.left = rect.left + "px";
        flying.style.top = rect.top + "px";
        flying.innerText = "抽牌";
        document.body.appendChild(flying);

        const card = deck.shift();
        
        // 飛向手牌中央
        setTimeout(() => {
            flying.style.left = "50%";
            flying.style.top = "90%";
            flying.style.transform = "translateX(-50%) rotate(360deg)";
            flying.style.opacity = "0";
        }, 50);

        setTimeout(() => {
            document.body.removeChild(flying);
            hand.push(card);
            renderHand();
        }, 650);
    }

    function renderHand() {
        const h = document.getElementById('hand');
        h.innerHTML = "";
        hand.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = "card";
            div.draggable = true;
            div.innerHTML = `
                <div class="hp-row"><span>${c.n}</span><span style="color:red">${c.hp}HP</span></div>
                <div class="atk-box">⚡ 招式傷害: ${c.atk}</div>
            `;
            div.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            h.appendChild(div);
        });
    }

    function dropToActive(e) {
        const idx = e.dataTransfer.getData("idx");
        const card = hand[idx];
        hand.splice(idx, 1);
        e.currentTarget.innerHTML = `
            <div class="card" style="width:100px; height:140px;">
                <div class="hp-row"><span>${card.n}</span><span style="color:red">${card.hp}HP</span></div>
                <div style="padding:10px; font-size:12px;">攻擊力: ${card.atk}</div>
            </div>
        `;
        renderHand();
    }

    function shuffleDeck() {
        shuffleArray(deck);
        document.getElementById('msg').innerText = "牌組已洗好！";
        setTimeout(() => document.getElementById('msg').innerText = "", 2000);
    }

    init();
</script>
</body>
</html>
