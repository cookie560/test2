<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Pro - Dragapult System</title>
    <style>
        :root {
            --mat-green: #1a4a1a;
            --card-w: 85px;
            --card-h: 119px;
            --ptcg-gold: #ffcb05;
        }

        body {
            margin: 0; background: #0a0a0a; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh;
        }

        /* 控制列 */
        .header {
            display: flex; gap: 15px; padding: 12px;
            background: #151515; border-bottom: 2px solid var(--ptcg-gold);
            align-items: center;
        }

        /* 專業對戰桌墊 */
        .board {
            position: relative; width: 900px; height: 500px;
            background: var(--mat-green); border-radius: 30px;
            margin: 20px auto; border: 6px solid #0d2b0d;
            display: grid; grid-template-columns: 160px 1fr 160px;
            padding: 20px; box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
        }

        .zone-label { font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 5px; }
        .slot {
            width: 100px; height: 140px; border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center;
        }

        /* 3D 卡牌特效 */
        .card-obj {
            width: var(--card-w); height: var(--card-h);
            position: absolute; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; transition: transform 0.6s;
        }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            border-radius: 8px; border: 1px solid white; backface-visibility: hidden;
            background-size: cover;
        }
        .card-front { transform: rotateY(180deg); }
        .card-back { background-image: url('https://limitlesstcg.s3.us-west-2.amazonaws.com/etc/pokemon-cardback.png'); }

        /* 洗牌動畫：左右交錯物理感 */
        @keyframes shuffle-l { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-80px, -10px) rotate(-10deg); } }
        @keyframes shuffle-r { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(80px, 10px) rotate(10deg); } }
        .shuffling-l { animation: shuffle-l 0.4s infinite; }
        .shuffling-r { animation: shuffle-r 0.4s infinite; }

        /* 抽牌動畫 */
        @keyframes flyToHand {
            0% { transform: translate(0,0) rotateY(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotateY(180deg); opacity: 0; }
        }
        .drawing-anim { animation: flyToHand 0.8s forwards; }

        /* 數據顯示 */
        .hp-badge {
            position: absolute; bottom: -10px; background: rgba(200, 0, 0, 0.9);
            padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold;
        }

        /* 手牌區：扇形展開 */
        .hand {
            position: fixed; bottom: -20px; width: 100%; height: 180px;
            display: flex; justify-content: center; align-items: flex-end;
        }
        .hand-card {
            width: 100px; height: 140px; margin-left: -30px;
            cursor: grab; transition: 0.3s; transform-origin: bottom center;
        }
        .hand-card:hover { transform: translateY(-30px) scale(1.1) !important; z-index: 100; }

        .log {
            position: fixed; right: 15px; top: 80px; width: 200px; height: 300px;
            background: rgba(0,0,0,0.7); border-radius: 10px; padding: 10px; font-size: 12px; overflow-y: auto;
        }
        button {
            padding: 8px 16px; background: var(--ptcg-gold); border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <button onclick="triggerShuffle()">🌀 洗牌</button>
    <button onclick="draw()">📥 抽牌</button>
    <button onclick="attack()" style="background:#ff4444; color:white;">⚔️ 攻擊</button>
    <span>牌組剩餘: <span id="deck-count">60</span></span>
</div>

<div class="board">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="slot" style="width:60px; height:85px;"></div>
        <div class="zone-label" style="grid-column: span 2;">PRIZE CARDS</div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:30px;">
        <div id="opponent-active" class="slot" style="width:110px; height:154px;"></div>
        <div id="player-active" class="slot" style="width:110px; height:154px;"></div>
    </div>

    <div style="display:flex; flex-direction:column; gap:20px;">
        <div class="slot" style="height:100px;"></div>
        <div id="deck-zone" style="position:relative; height:140px; cursor:pointer;" onclick="draw()">
            <div id="deck-stack"></div>
        </div>
        <div class="zone-label">DECK / DISCARD</div>
    </div>
</div>

<div id="hand" class="hand"></div>
<div id="log" class="log"></div>

<script>
// 1. 數據與狀態
const cardPool = [
    { name: "Dragapult ex", hp: 320, img: "https://images.pokemontcg.io/sv6/130_hires.png" },
    { name: "Drakloak", hp: 90, img: "https://images.pokemontcg.io/sv6/129_hires.png" },
    { name: "Dreepy", hp: 70, img: "https://images.pokemontcg.io/sv6/128_hires.png" }
];

let game = {
    deck: [],
    hand: [],
    playerActive: null,
    opponentActive: null,
    isAnimating: false
};

// 2. 初始化
function init() {
    for (let i = 0; i < 60; i++) {
        const c = cardPool[i % cardPool.length];
        game.deck.push({ ...c, id: Math.random(), currentHp: c.hp, energy: 0 });
    }
    updateDeckUI();
}

// 3. 🌀 洗牌系統 (保留物理交錯動畫)
function triggerShuffle() {
    if (game.isAnimating) return;
    game.isAnimating = true;
    log("正在洗牌...");

    const cards = document.querySelectorAll('.deck-card');
    cards.forEach((c, i) => c.classList.add(i % 2 === 0 ? 'shuffling-l' : 'shuffling-r'));

    setTimeout(() => {
        game.deck.sort(() => Math.random() - 0.5);
        cards.forEach(c => c.classList.remove('shuffling-l', 'shuffling-r'));
        game.isAnimating = false;
        updateDeckUI();
        log("牌組洗牌完成");
    }, 1200);
}

// 4. 📥 抽牌系統 (保留翻轉動畫)
function draw() {
    if (game.deck.length === 0 || game.isAnimating) return;

    const card = game.deck.shift();
    const deckRect = document.getElementById('deck-zone').getBoundingClientRect();
    
    // 動畫物件
    const fly = document.createElement('div');
    fly.className = "card-obj drawing-anim";
    fly.style.left = deckRect.left + "px"; fly.style.top = deckRect.top + "px";
    fly.innerHTML = `<div class="card-inner"><div class="card-back"></div></div>`;
    
    const tx = window.innerWidth / 2 - deckRect.left;
    const ty = window.innerHeight - deckRect.top - 100;
    fly.style.setProperty('--tx', `${tx}px`); fly.style.setProperty('--ty', `${ty}px`);
    
    document.body.appendChild(fly);
    updateDeckUI();

    setTimeout(() => {
        document.body.removeChild(fly);
        game.hand.push(card);
        renderHand();
    }, 800);
}

// 5. 渲染邏輯
function renderHand() {
    const handDiv = document.getElementById("hand");
    handDiv.innerHTML = "";
    game.hand.forEach((card, i) => {
        const c = document.createElement("div");
        c.className = "card-obj hand-card";
        const angle = (i - (game.hand.length - 1) / 2) * 6;
        c.style.transform = `rotate(${angle}deg)`;
        
        c.innerHTML = `<div class="card-inner" style="transform:rotateY(180deg)">
            <div class="card-front" style="background-image:url(${card.img})"></div>
        </div>`;

        c.onclick = () => {
            game.playerActive = { ...card, energy: (game.playerActive?.energy || 0) + 1 };
            game.hand.splice(i, 1);
            render();
        };
        handDiv.appendChild(c);
    });
}

function render() {
    const pZone = document.getElementById("player-active");
    const oZone = document.getElementById("opponent-active");
    
    pZone.innerHTML = game.playerActive ? createCardHTML(game.playerActive) : "";
    
    if (!game.opponentActive) spawnOpponent();
    oZone.innerHTML = createCardHTML(game.opponentActive);
    
    renderHand();
}

function createCardHTML(card) {
    return `<div class="card-front" style="background-image:url(${card.img}); width:100%; height:100%; position:relative;">
        <div class="hp-badge">HP: ${card.currentHp} | E: ${card.energy}</div>
    </div>`;
}

function updateDeckUI() {
    document.getElementById('deck-count').innerText = game.deck.length;
    const stack = document.getElementById('deck-stack');
    stack.innerHTML = "";
    for (let i = 0; i < Math.min(game.deck.length, 10); i++) {
        const d = document.createElement('div');
        d.className = "card-back deck-card";
        d.style.position = "absolute"; d.style.top = -i+"px"; d.style.left = i+"px";
        d.style.width = "75px"; d.style.height = "105px";
        stack.appendChild(d);
    }
}

// 6. 戰鬥邏輯
function attack() {
    if (!game.playerActive) return log("請先放置寶可夢");
    if (game.playerActive.energy < 1) return log("能量不足，點擊手牌附給能量");

    const dmg = 100;
    game.opponentActive.currentHp -= dmg;
    log(`你發動攻擊，造成 ${dmg} 傷害`);

    if (game.opponentActive.currentHp <= 0) {
        log("擊倒對手！");
        game.opponentActive = null;
    }
    render();
}

function spawnOpponent() {
    const base = cardPool[Math.floor(Math.random() * cardPool.length)];
    game.opponentActive = { ...base, currentHp: base.hp, energy: 2 };
}

function log(msg) {
    const box = document.getElementById("log");
    box.innerHTML += `<div>> ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

init();
</script>
</body>
</html>
