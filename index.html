<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Live Simulator - Dragapult ex</title>
    <style>
        :root {
            --ptcg-blue: #2a6db5;
            --ptcg-gold: #ffcb05;
            --field-bg: #0f1a10;
            --card-w: 90px;
            --card-h: 126px;
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Oswald', 'PingFang TC', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* 頂部 HUD */
        .hud-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; background: linear-gradient(to bottom, #222, transparent);
            z-index: 100;
        }

        /* 3D 對戰舞台 */
        .arena {
            position: relative; flex: 1;
            perspective: 1200px;
            background: radial-gradient(circle at center, #1a3c1a 0%, #050a05 100%);
            display: flex; justify-content: center; align-items: center;
        }

        .board-3d {
            position: relative; width: 1000px; height: 600px;
            transform: rotateX(25deg); transform-style: preserve-3d;
            display: grid; grid-template-columns: 180px 1fr 180px; gap: 20px;
            padding: 20px;
        }

        /* 區域插槽樣式 */
        .slot {
            border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
            background: rgba(255,255,255,0.05); position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .slot.active { border-color: var(--ptcg-gold); box-shadow: 0 0 30px rgba(255, 203, 5, 0.2); }

        /* 卡牌與洗牌動畫 */
        .card-entity {
            width: var(--card-w); height: var(--card-h);
            position: absolute; transform-style: preserve-3d;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 8px;
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .front { transform: rotateY(180deg); background-size: cover; }
        .back { background-image: url('https://limitlesstcg.s3.us-west-2.amazonaws.com/etc/pokemon-cardback.png'); background-size: cover; }

        /* 🌀 物理洗牌動畫關鍵幀 */
        @keyframes riffle-left {
            0%, 100% { transform: translate(0,0) rotateY(0); }
            50% { transform: translate(-120px, -20px) rotateY(-20deg) rotateZ(-5deg); }
        }
        @keyframes riffle-right {
            0%, 100% { transform: translate(0,0) rotateY(0); }
            50% { transform: translate(120px, 20px) rotateY(20deg) rotateZ(5deg); }
        }
        .shuffling-l { animation: riffle-left 0.4s ease-in-out infinite; }
        .shuffling-r { animation: riffle-right 0.4s ease-in-out infinite; }

        /* 戰鬥數值浮動層 */
        .card-stats {
            position: absolute; bottom: -20px; width: 100%;
            display: flex; justify-content: space-around;
            pointer-events: none;
        }
        .stat-badge {
            background: rgba(0,0,0,0.8); padding: 2px 6px;
            border-radius: 4px; font-size: 12px; border: 1px solid var(--ptcg-gold);
        }

        /* 扇形手牌區 */
        .hand-dock {
            position: fixed; bottom: -30px; width: 100%; height: 200px;
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 500;
        }
        .hand-card {
            width: 110px; height: 154px; margin-left: -40px;
            transform-origin: bottom center; cursor: pointer;
            transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .hand-card:hover { transform: translateY(-60px) scale(1.2) !important; z-index: 1000 !important; }

        /* 攻擊按鈕 (PTCG Live 風格) */
        .action-btn {
            background: linear-gradient(135deg, #ffcb05 0%, #ff8c00 100%);
            border: none; padding: 12px 30px; border-radius: 50px;
            font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
            transition: 0.2s;
        }
        .action-btn:hover { transform: scale(1.1); filter: brightness(1.2); }

        .log-panel {
            position: fixed; left: 20px; bottom: 20px; width: 250px; height: 150px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            border-radius: 10px; padding: 10px; font-size: 13px;
            overflow-y: auto; color: #aaa; border-left: 4px solid var(--ptcg-gold);
        }
    </style>
</head>
<body>

<div class="hud-top">
    <div style="font-size: 24px; font-weight: bold;">OPPONENT <span style="color: #ff4444;" id="opp-hp-top">320</span></div>
    <div id="turn-indicator" style="background: var(--ptcg-gold); color: black; padding: 5px 20px; border-radius: 5px; font-weight: bold;">YOUR TURN</div>
    <div style="font-size: 24px; font-weight: bold;">PLAYER <span style="color: #44ff44;" id="play-hp-top">320</span></div>
</div>

<div class="arena">
    <div class="board-3d">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:space-between; align-items:center;">
            <div id="opp-active-slot" class="slot active" style="width:140px; height:196px;"></div>
            <button class="action-btn" onclick="executeAttack()">PHANTOM DIVE</button>
            <div id="play-active-slot" class="slot active" style="width:140px; height:196px;"></div>
        </div>

        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="slot" style="height:120px;" data-label="Discard"></div>
            <div id="deck-zone" style="height:160px; position:relative; cursor:pointer;" onclick="drawCard()">
                <div id="deck-visual-stack"></div>
            </div>
            <button onclick="shuffleDeck()" style="background:none; border:1px solid #555; color:#555; cursor:pointer; border-radius:5px;">SHUFFLE</button>
        </div>
    </div>
</div>

<div class="hand-dock" id="hand-display"></div>
<div class="log-panel" id="game-log"></div>

<script>
    // 1. 真實清單數據 (從你提供的圖片中解析)
    const DRAGAPULT_DECK = [
        { name: "Dragapult ex", hp: 320, img: "https://images.pokemontcg.io/sv6/130_hires.png", type: "pkmn" },
        { name: "Drakloak", hp: 90, img: "https://images.pokemontcg.io/sv6/129_hires.png", type: "pkmn" },
        { name: "Dreepy", hp: 70, img: "https://images.pokemontcg.io/sv6/128_hires.png", type: "pkmn" },
        { name: "Fire Energy", img: "https://images.pokemontcg.io/sm12/energy2_hires.png", type: "energy" }
    ];

    let gameState = {
        deck: [],
        hand: [],
        playerActive: null,
        opponentActive: { ...DRAGAPULT_DECK[0], currentHp: 320, energy: 2 },
        isAnimating: false
    };

    function init() {
        // 建立 60 張牌
        for(let i=0; i<60; i++) {
            const proto = DRAGAPULT_DECK[i % DRAGAPULT_DECK.length];
            gameState.deck.push({...proto, id: Math.random()});
        }
        renderDeck();
        log("Game Initialized. Dragapult ex ready.");
    }

    // 🌀 專業物理洗牌邏輯
    function shuffleDeck() {
        if(gameState.isAnimating) return;
        gameState.isAnimating = true;
        log("Riffle Shuffling...");

        const cards = document.querySelectorAll('.deck-c');
        cards.forEach((c, i) => c.classList.add(i % 2 === 0 ? 'shuffling-l' : 'shuffling-r'));

        setTimeout(() => {
            gameState.deck.sort(() => Math.random() - 0.5);
            cards.forEach(c => c.classList.remove('shuffling-l', 'shuffling-r'));
            gameState.isAnimating = false;
            renderDeck();
            log("Deck shuffled successfully.");
        }, 1500);
    }

    // 📥 抽牌與 3D 翻轉動畫
    function drawCard() {
        if(gameState.deck.length === 0 || gameState.isAnimating) return;
        const card = gameState.deck.shift();
        
        // 動畫實體
        const deckRect = document.getElementById('deck-zone').getBoundingClientRect();
        const fly = document.createElement('div');
        fly.className = "card-entity";
        fly.style.left = deckRect.left + "px"; fly.style.top = deckRect.top + "px";
        fly.innerHTML = `<div class="card-inner"><div class="face back"></div><div class="face front" style="background-image:url(${card.img})"></div></div>`;
        document.body.appendChild(fly);

        setTimeout(() => {
            fly.style.left = "50%"; fly.style.top = "80%";
            fly.style.transform = "rotateY(180deg) scale(1.2)";
        }, 50);

        setTimeout(() => {
            document.body.removeChild(fly);
            gameState.hand.push(card);
            renderHand();
            renderDeck();
        }, 800);
    }

    function renderHand() {
        const dock = document.getElementById('hand-display');
        dock.innerHTML = "";
        gameState.hand.forEach((card, i) => {
            const el = document.createElement('div');
            el.className = "card-entity hand-card";
            const angle = (i - (gameState.hand.length - 1) / 2) * 7;
            const y = Math.abs(i - (gameState.hand.length - 1) / 2) * 4;
            el.style.transform = `rotate(${angle}deg) translateY(${y}px)`;
            el.innerHTML = `<div class="card-inner" style="transform:rotateY(180deg)">
                <div class="face front" style="background-image:url(${card.img})"></div>
            </div>`;
            el.onclick = () => playToActive(i);
            dock.appendChild(el);
        });
    }

    function playToActive(index) {
        const card = gameState.hand[index];
        if(card.type === "pkmn") {
            gameState.playerActive = { ...card, currentHp: card.hp, energy: 0 };
            log(`Deployed ${card.name} to Active Spot.`);
        } else {
            if(gameState.playerActive) {
                gameState.playerActive.energy++;
                log("Attached Fire Energy.");
            }
        }
        gameState.hand.splice(index, 1);
        renderBoard();
        renderHand();
    }

    function executeAttack() {
        if(!gameState.playerActive) return log("No Pokemon in Active Spot!");
        if(gameState.playerActive.energy < 1) return log("Need at least 1 Energy!");

        const dmg = 200;
        gameState.opponentActive.currentHp -= dmg;
        log(`Dragapult uses PHANTOM DIVE! Deals ${dmg} damage.`);
        
        if(gameState.opponentActive.currentHp <= 0) {
            log("Opponent Knocked Out!");
            gameState.opponentActive.currentHp = 320; // 模擬下一隻
        }
        renderBoard();
    }

    function renderBoard() {
        const pSlot = document.getElementById('play-active-slot');
        const oSlot = document.getElementById('opp-active-slot');
        
        if(gameState.playerActive) {
            pSlot.innerHTML = `<div class="face front" style="background-image:url(${gameState.playerActive.img}); width:100%; height:100%; position:static;"></div>
                <div class="card-stats"><span class="stat-badge">HP ${gameState.playerActive.currentHp}</span><span class="stat-badge">E ${gameState.playerActive.energy}</span></div>`;
        }
        
        oSlot.innerHTML = `<div class="face front" style="background-image:url(${gameState.opponentActive.img}); width:100%; height:100%; position:static;"></div>
            <div class="card-stats"><span class="stat-badge">HP ${gameState.opponentActive.currentHp}</span></div>`;
            
        document.getElementById('play-hp-top').innerText = gameState.playerActive?.currentHp || 0;
        document.getElementById('opp-hp-top').innerText = gameState.opponentActive.currentHp;
    }

    function renderDeck() {
        const stack = document.getElementById('deck-visual-stack');
        stack.innerHTML = "";
        for(let i=0; i<Math.min(gameState.deck.length, 12); i++) {
            const d = document.createElement('div');
            d.className = "face back deck-c";
            d.style.position = "absolute"; d.style.top = -i*1.5+"px"; d.style.left = i*0.5+"px";
            d.style.width = "85px"; d.style.height = "118px";
            stack.appendChild(d);
        }
    }

    function log(msg) {
        const l = document.getElementById('game-log');
        l.innerHTML += `<div>> ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    init();
</script>
</body>
</html>
