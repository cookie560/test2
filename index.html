<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG Master Academy | 頂尖訓練家教室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; transition: background 0.3s; }
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .step-active { color: #2563eb !important; border-bottom: 3px solid #2563eb; }
        .ptcg-card { transition: all 0.3s ease; }
        .ptcg-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
    <body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
 <nav class="glass-nav fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showPage(1)">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg"><i class="fas fa-bolt text-xs"></i></div>
                
            </div>
            <div id="nav-links" class="hidden md:flex gap-6 text-sm font-bold text-slate-400">
                <button onclick="showPage(1)" id="n1" class="pb-1 transition">勝利規則</button>
                <button onclick="showPage(2)" id="n2" class="pb-1 transition">卡牌解析</button>
                <button onclick="showPage(3)" id="n3" class="pb-1 transition">對戰流程</button>
                <button onclick="showPage(4)" id="n4" class="pb-1 transition">推薦套牌</button>
                <button onclick="showPage(5)" id="n5" class="pb-1 transition">執照測驗</button>
            </div>
        </div>
    </nav>
 
</body>
</html>
