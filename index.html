<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 官方規則模擬器</title>
    <style>
        /* 延用之前的綠色桌墊與佈局樣式... */
        .status-bar { background: #333; color: #ffcb05; padding: 10px; display: flex; gap: 20px; }
    </style>
</head>
<body>

<div class="status-bar">
    <div>當前回合：<span id="turn-count">1</span></div>
    <div>能量附給：<span id="energy-limit">尚未附給</span></div>
    <div>支援者卡：<span id="supporter-limit">未使用</span></div>
    <div style="color:red">剩餘獎賞卡：<span id="prize-count">6</span></div>
</div>

<div id="play-mat">
    </div>

<script>
    // 遊戲狀態追蹤 (符合影片規則)
    let gameState = {
        hasAttachedEnergy: false,
        hasUsedSupporter: false,
        prizeCards: 6,
        currentTurn: 1
    };

    // 影片規則 [00:01:02]：一回合只能附一張能量
    function attachEnergy(pokemon, energyCard) {
        if (gameState.hasAttachedEnergy) {
            alert("官方規則：一回合只能附加一張能量卡！");
            return;
        }
        // 執行附加邏輯...
        gameState.hasAttachedEnergy = true;
        document.getElementById('energy-limit').innerText = "已附給";
    }

    // 影片規則 [00:01:42]：支援者一回合一次
    function playSupporter(card) {
        if (gameState.hasUsedSupporter) {
            alert("官方規則：支援者卡一回合只能使用一次！");
            return;
        }
        // 執行支援者效果 (如：莉莉艾的決意 抽 6 張)
        gameState.hasUsedSupporter = true;
        document.getElementById('supporter-limit').innerText = "已使用";
    }

    // 影片規則 [00:04:06]：昏絕拿獎賞卡
    function checkKnockOut(opponentPokemon) {
        if (opponentPokemon.hp <= 0) {
            gameState.prizeCards--;
            document.getElementById('prize-count').innerText = gameState.prizeCards;
            if (gameState.prizeCards <= 0) {
                alert("你拿完了所有獎賞卡，獲得勝利！");
            }
        }
    }

    // 回合結束重置限制
    function endTurn() {
        gameState.currentTurn++;
        gameState.hasAttachedEnergy = false;
        gameState.hasUsedSupporter = false;
        document.getElementById('turn-count').innerText = gameState.currentTurn;
        document.getElementById('energy-limit').innerText = "尚未附給";
        document.getElementById('supporter-limit').innerText = "未使用";
    }

    // 初始化準備 [00:00:12]
    function setupGame() {
        // 1. 洗牌 2. 抽 7 張 3. 放置基礎寶可夢 4. 設定 6 張獎賞卡
        console.log("正在按照官方 5 分鐘教學規則初始化對戰...");
    }

    setupGame();
</script>
</body>
</html>
</body>
</html>
