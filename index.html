<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Pro - Dragapult ex</title>
    <style>
        :root {
            --ptcg-blue: #1b3664; /* 經典寶可夢背殼深藍 */
            --ptcg-gold: #ffcb05;
            --card-w: 85px;
            --card-h: 118px;
        }

        body {
            margin: 0; background: #050a05; color: white;
            font-family: 'PingFang TC', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- 官方卡背 CSS 繪圖 (保證看得見) --- */
        .pokemon-back {
            width: 100%; height: 100%;
            background: var(--ptcg-blue);
            border: 3px solid #fdfdfd; border-radius: 8px;
            position: relative; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .pokemon-back::before { /* 精靈球裝飾 */
            content: ""; width: 50px; height: 50px;
            border: 4px solid var(--ptcg-gold); border-radius: 50%;
            background: radial-gradient(circle, #fff 10%, transparent 60%);
            opacity: 0.3;
        }

        /* --- 戰場佈局 --- */
        .arena {
            perspective: 1500px; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle, #1a3c1a 0%, #000 100%);
        }

        .board-3d {
            width: 1050px; height: 600px; transform: rotateX(20deg);
            transform-style: preserve-3d; display: grid;
            grid-template-columns: 180px 1fr 180px; gap: 20px; padding: 20px;
        }

        .slot {
            border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px;
            background: rgba(255,255,255,0.02); position: relative;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .slot.highlight { border-color: var(--ptcg-gold); background: rgba(255, 203, 5, 0.1); }

        /* --- 卡牌物件 --- */
        .card-obj {
            width: var(--card-w); height: var(--card-h); cursor: grab;
            position: relative; transition: transform 0.2s;
        }
        .card-inner {
            width: 100%; height: 100%; transform-style: preserve-3d;
            transition: transform 0.5s; position: relative;
        }
        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 8px; border: 2px solid white;
        }
        .front { background-size: cover; transform: rotateY(180deg); }

        /* --- 物理洗牌動畫 --- */
        @keyframes riffle-l { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-100px,-20px) rotate(-10deg)} }
        @keyframes riffle-r { 0%,100%{transform:translate(0,0)} 50%{transform:translate(100px,20px) rotate(10deg)} }
        .shf-l { animation: riffle-l 0.4s infinite; }
        .shf-r { animation: riffle-r 0.4s infinite; }

        /* --- 手牌區 --- */
        .hand {
            position: fixed; bottom: -20px; width: 100%; height: 180px;
            display: flex; justify-content: center; align-items: flex-end; z-index: 500;
        }
        .hand-card { margin-left: -40px; transition: 0.3s; transform-origin: bottom center; }
        .hand-card:hover { transform: translateY(-70px) scale(1.3) !important; z-index: 600; }

        /* HUD */
        .side-bar { position: fixed; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: var(--ptcg-gold); border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="arena">
    <div class="board-3d">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="slot" style="height:90px;"><div class="pokemon-back"></div></div>
            <div class="slot" style="height:90px;"><div class="pokemon-back"></div></div>
            <div class="slot" style="height:90px;"><div class="pokemon-back"></div></div>
            <div class="slot" style="height:90px;"><div class="pokemon-back"></div></div>
            <div class="slot" style="height:90px;"><div class="pokemon-back"></div></div>
            <div class="slot" style="height:90px;"><div class="pokemon-back"></div></div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; justify-content:space-between;">
            <div id="opp-active" class="slot" style="width:130px; height:180px;">對手位</div>
            
            <div id="p-active" class="slot" style="width:130px; height:180px; border:2px solid var(--ptcg-gold);" 
                 ondragover="over(event)" ondrop="drop(event, 'active')">
                <span style="opacity:0.2">戰鬥位 (拖放到此)</span>
            </div>
            
            <div style="display:flex; gap:10px;">
                <div class="slot" style="width:85px; height:118px;" ondragover="over(event)" ondrop="drop(event, 'bench', 0)"></div>
                <div class="slot" style="width:85px; height:118px;" ondragover="over(event)" ondrop="drop(event, 'bench', 1)"></div>
                <div class="slot" style="width:85px; height:118px;" ondragover="over(event)" ondrop="drop(event, 'bench', 2)"></div>
                <div class="slot" style="width:85px; height:118px;" ondragover="over(event)" ondrop="drop(event, 'bench', 3)"></div>
                <div class="slot" style="width:85px; height:118px;" ondragover="over(event)" ondrop="drop(event, 'bench', 4)"></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:flex-end; gap:20px;">
            <div id="discard" class="slot" style="height:140px;">棄牌區</div>
            <div id="deck" style="position:relative; height:160px; cursor:pointer;" onclick="draw()">
                <div id="deck-visual"></div>
            </div>
        </div>
    </div>
</div>

<div class="side-bar">
    <button class="btn" onclick="shuffle()">🌀 物理洗牌</button>
    <button class="btn" onclick="draw()">📥 抽牌</button>
</div>

<div id="hand" class="hand"></div>

<script>
    const cardData = [
        { name: "多龍巴魯托 ex", img: "https://images.pokemontcg.io/sv6/130_hires.png" },
        { name: "多龍梅西亞", img: "https://images.pokemontcg.io/sv6/128_hires.png" }
    ];

    let state = { deck: [], hand: [], active: null, bench: [null,null,null,null,null] };

    function init() {
        for(let i=0; i<60; i++) state.deck.push({...cardData[i%2], id: Math.random()});
        renderDeck();
    }

    // 🌀 物理洗牌動畫
    function shuffle() {
        const cards = document.querySelectorAll('.d-card');
        cards.forEach((c, i) => c.classList.add(i % 2 === 0 ? 'shf-l' : 'shf-r'));
        setTimeout(() => {
            state.deck.sort(() => Math.random() - 0.5);
            cards.forEach(c => c.classList.remove('shf-l', 'shf-r'));
            renderDeck();
        }, 1000);
    }

    function renderDeck() {
        const d = document.getElementById('deck-visual');
        d.innerHTML = "";
        for(let i=0; i<Math.min(state.deck.length, 10); i++) {
            const c = document.createElement('div');
            c.className = "d-card";
            c.style.cssText = `position:absolute; width:80px; height:110px; top:-${i}px; left:${i}px; z-index:${i};`;
            c.innerHTML = `<div class="pokemon-back"></div>`;
            d.appendChild(c);
        }
    }

    function draw() {
        if(state.deck.length === 0) return;
        state.hand.push(state.deck.shift());
        renderHand(); renderDeck();
    }

    function renderHand() {
        const h = document.getElementById('hand');
        h.innerHTML = "";
        state.hand.forEach((card, i) => {
            const c = document.createElement('div');
            c.className = "card-obj hand-card";
            c.draggable = true;
            c.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            
            const angle = (i - (state.hand.length-1)/2) * 6;
            c.style.transform = `rotate(${angle}deg)`;
            
            c.innerHTML = `
                <div class="card-inner" style="transform:rotateY(180deg)">
                    <div class="back"><div class="pokemon-back"></div></div>
                    <div class="front" style="background-image:url(${card.img})"></div>
                </div>`;
            h.appendChild(c);
        });
    }

    // 🖱️ 拖放功能
    function over(e) { e.preventDefault(); e.currentTarget.classList.add('highlight'); }
    
    function drop(e, target, bIdx) {
        e.preventDefault();
        e.currentTarget.classList.remove('highlight');
        const idx = e.dataTransfer.setData("idx", e.dataTransfer.getData("idx")); // 備份
        const realIdx = e.dataTransfer.getData("idx");
        const card = state.hand[realIdx];

        if(target === 'active') state.active = card;
        else state.bench[bIdx] = card;

        state.hand.splice(realIdx, 1);
        renderBoard(); renderHand();
    }

    function renderBoard() {
        // 出戰位
        const pA = document.getElementById('p-active');
        pA.innerHTML = state.active ? `<div class="front" style="width:100%; height:100%; background-image:url(${state.active.img}); transform:none; position:static;"></div>` : "";
        
        // 備戰位
        const slots = document.querySelectorAll('.arena div:nth-child(2) div:nth-child(3) .slot');
        state.bench.forEach((c, i) => {
            slots[i].innerHTML = c ? `<div class="front" style="width:100%; height:100%; background-image:url(${c.img}); transform:none; position:static;"></div>` : "";
        });

        // 對手模擬
        document.getElementById('opp-active').innerHTML = `<div class="front" style="width:100%; height:100%; background-image:url(${cardData[0].img}); transform:none; position:static;"></div>`;
    }

    init();
</script>
</body>
</html>
