<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Live Simulator - Dragapult ex</title>
    <style>
        :root {
            --live-blue: #00d2ff;
            --live-gold: #ffcb05;
            --card-w: 80px;
            --card-h: 112px;
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Exo 2', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- 頂部 HUD --- */
        .top-hud {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .hp-display { font-size: 24px; font-weight: 900; color: var(--live-gold); }

        /* --- 右側控制台 (不擋手牌) --- */
        .side-controls {
            position: fixed; right: 20px; bottom: 180px; 
            display: flex; flex-direction: column; gap: 15px; z-index: 100;
        }

        /* --- 3D 戰場 --- */
        .arena {
            perspective: 1500px; width: 100%; height: 100vh;
            background: radial-gradient(circle at center, #152515 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
        }
        .board-3d {
            width: 1000px; height: 550px; transform: rotateX(22deg) translateY(-20px);
            transform-style: preserve-3d; display: grid;
            grid-template-columns: 160px 1fr 160px; gap: 20px;
        }

        .slot {
            border: 2px solid rgba(255,255,255,0.1); border-radius: 10px;
            background: rgba(255,255,255,0.03); position: relative;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .slot.active-vibe { border-color: var(--live-blue); box-shadow: 0 0 15px rgba(0,210,255,0.2); }
        .slot.hover { background: rgba(0, 210, 255, 0.15); border-color: var(--live-blue); }

        /* --- 卡牌實體 --- */
        .card-entity {
            width: var(--card-w); height: var(--card-h); cursor: grab;
            border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.7);
            background-size: cover; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .energy-count {
            position: absolute; top: -8px; right: -8px; width: 22px; height: 22px;
            background: radial-gradient(circle, #ff6a00, #ee0979); border: 2px solid white;
            border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }

        /* 🌀 物理洗牌動畫 (核心回歸) */
        @keyframes riffle-l { 0%,100% {transform:translate(0,0)} 50% {transform:translate(-100px, -15px) rotate(-15deg)} }
        @keyframes riffle-r { 0%,100% {transform:translate(0,0)} 50% {transform:translate(100px, 15px) rotate(15deg)} }
        .shf-l { animation: riffle-l 0.4s infinite; }
        .shf-r { animation: riffle-r 0.4s infinite; }

        /* --- 手牌區 (優化後的層級與位置) --- */
        .hand-dock {
            position: fixed; bottom: -10px; width: 100%; height: 160px;
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 200; pointer-events: none; /* 穿透至背景但子元素可互動 */
        }
        .hand-card { 
            margin-left: -35px; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); 
            transform-origin: bottom center; pointer-events: auto;
        }
        .hand-card:hover { transform: translateY(-70px) scale(1.3) !important; z-index: 500; }

        .btn-live {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none; padding: 12px 25px; border-radius: 8px;
            color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,210,255,0.3);
        }
        .btn-live:active { transform: scale(0.95); }

        .log { position: fixed; left: 20px; bottom: 20px; width: 180px; font-size: 11px; color: #666; pointer-events: none; }
    </style>
</head>
<body>

<div class="top-hud">
    <div class="hp-display">OPP: <span id="opp-hp">320</span></div>
    <div style="font-weight: 100; opacity: 0.5;">DRAGAPULT EX SIMULATOR</div>
    <div class="hp-display">YOU: <span id="play-hp">320</span></div>
</div>

<div class="side-controls">
    <button class="btn-live" style="background: #333;" onclick="startShuffle()">🌀 SHUFFLE</button>
    <button class="btn-live" onclick="draw()">📥 DRAW</button>
    <button class="btn-live" style="background: #f44;" onclick="attack()">⚔️ ATTACK</button>
</div>

<div class="arena">
    <div class="board-3d">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px;">
            <div class="slot" style="height:70px;"></div><div class="slot" style="height:70px;"></div>
            <div class="slot" style="height:70px;"></div><div class="slot" style="height:70px;"></div>
            <div class="slot" style="height:70px;"></div><div class="slot" style="height:70px;"></div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; justify-content:space-between;">
            <div id="o-active" class="slot active-vibe" style="width:120px; height:168px;"></div>
            
            <div id="p-active" class="slot active-vibe" style="width:120px; height:168px;" 
                 ondragover="over(event)" ondrop="drop(event, 'active')"></div>
            
            <div style="display:flex; gap:8px; height:105px;">
                <div class="slot" style="width:75px;" ondragover="over(event)" ondrop="drop(event, 'bench', 0)"></div>
                <div class="slot" style="width:75px;" ondragover="over(event)" ondrop="drop(event, 'bench', 1)"></div>
                <div class="slot" style="width:75px;" ondragover="over(event)" ondrop="drop(event, 'bench', 2)"></div>
                <div class="slot" style="width:75px;" ondragover="over(event)" ondrop="drop(event, 'bench', 3)"></div>
                <div class="slot" style="width:75px;" ondragover="over(event)" ondrop="drop(event, 'bench', 4)"></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:flex-end; gap:15px; padding:10px;">
            <div id="discard-slot" class="slot" style="height:120px;"></div>
            <div id="deck-zone" style="position:relative; height:140px; cursor:pointer;" onclick="draw()">
                <div id="deck-stack"></div>
            </div>
        </div>
    </div>
</div>

<div id="hand" class="hand-dock"></div>
<div id="log" class="log"></div>

<script>
    const cardData = [
        { name: "Dragapult ex", hp: 320, img: "https://images.pokemontcg.io/sv6/130_hires.png" },
        { name: "Drakloak", hp: 90, img: "https://images.pokemontcg.io/sv6/129_hires.png" },
        { name: "Dreepy", hp: 70, img: "https://images.pokemontcg.io/sv6/128_hires.png" }
    ];

    let state = {
        deck: [], hand: [], discard: [],
        active: null, bench: [null, null, null, null, null],
        oppHP: 320
    };

    function init() {
        for(let i=0; i<60; i++) state.deck.push({...cardData[i%3], id: Math.random(), energy: 0});
        renderDeck();
        log("System Ready.");
    }

    function startShuffle() {
        const cards = document.querySelectorAll('.d-card');
        cards.forEach((c, i) => c.classList.add(i % 2 === 0 ? 'shf-l' : 'shf-r'));
        setTimeout(() => {
            state.deck.sort(() => Math.random() - 0.5);
            cards.forEach(c => c.classList.remove('shf-l', 'shf-r'));
            renderDeck();
            log("Deck shuffled.");
        }, 1200);
    }

    function renderDeck() {
        const stack = document.getElementById('deck-stack');
        stack.innerHTML = "";
        for(let i=0; i<Math.min(state.deck.length, 10); i++) {
            const d = document.createElement('div');
            d.className = "card-entity d-card";
            d.style.position = "absolute"; d.style.top = -i+"px"; d.style.left = i+"px";
            d.style.backgroundImage = "url('https://limitlesstcg.s3.us-west-2.amazonaws.com/etc/pokemon-cardback.png')";
            stack.appendChild(d);
        }
    }

    function draw() {
        if(state.deck.length === 0) return;
        state.hand.push(state.deck.shift());
        renderHand(); renderDeck();
    }

    function renderHand() {
        const h = document.getElementById('hand');
        h.innerHTML = "";
        state.hand.forEach((card, i) => {
            const c = document.createElement('div');
            c.className = "card-entity hand-card";
            c.style.backgroundImage = `url(${card.img})`;
            c.draggable = true;
            c.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            const rot = (i - (state.hand.length-1)/2) * 5;
            c.style.transform = `rotate(${rot}deg)`;
            h.appendChild(c);
        });
    }

    function over(e) { e.preventDefault(); e.currentTarget.classList.add('hover'); }

    function drop(e, target, bIdx) {
        e.preventDefault();
        e.currentTarget.classList.remove('hover');
        const idx = e.dataTransfer.getData("idx");
        const card = state.hand[idx];

        if(target === 'active') {
            if(state.active) state.discard.push(state.active);
            state.active = card;
        } else {
            if(state.bench[bIdx]) state.discard.push(state.bench[bIdx]);
            state.bench[bIdx] = card;
        }
        state.hand.splice(idx, 1);
        renderBoard(); renderHand(); updateDiscard();
    }

    function renderBoard() {
        document.getElementById('p-active').innerHTML = state.active ? createCard(state.active) : "";
        const bSlots = document.querySelectorAll('.board-3d div:nth-child(2) div:nth-child(3) .slot');
        state.bench.forEach((c, i) => bSlots[i].innerHTML = c ? createCard(c) : "");
        document.getElementById('play-hp').innerText = state.active ? state.active.hp : "320";
        document.getElementById('o-active').innerHTML = createCard({img: cardData[0].img, energy: 2});
    }

    function createCard(c) {
        return `<div class="card-entity" style="background-image:url(${c.img}); width:100%; height:100%;">
            <div class="energy-count">${c.energy || 0}</div>
        </div>`;
    }

    function updateDiscard() {
        if(state.discard.length > 0) {
            const top = state.discard[state.discard.length-1];
            document.getElementById('discard-slot').innerHTML = `<div class="card-entity" style="background-image:url(${top.img}); width:100%; height:100%; opacity:0.4; filter:grayscale(1);"></div>`;
        }
    }

    function attack() {
        if(!state.active) return;
        state.oppHP -= 50;
        document.getElementById('opp-hp').innerText = state.oppHP;
        log("Attack! -50HP");
    }

    function log(m) {
        const b = document.getElementById('log');
        b.innerHTML += `<div>> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    init();
</script>
</body>
</html>
