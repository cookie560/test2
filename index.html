<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Professional Simulator - Dragapult ex Deck</title>
    <style>
        :root {
            --mat-color: #1e3a1e;
            --slot-border: rgba(255, 215, 0, 0.3);
            --card-w: 80px;
            --card-h: 112px;
            --deck-depth: 12px;
        }

        body { 
            margin: 0; background: #0a0a0a; color: #eee; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* 專業 UI 面板 */
        .hud {
            width: 100%; height: 60px; background: linear-gradient(180deg, #333, #111);
            display: flex; align-items: center; justify-content: space-around;
            border-bottom: 2px solid #ffcb05; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .hud-item { display: flex; flex-direction: column; align-items: center; }
        .hud-value { font-size: 18px; font-weight: bold; color: #ffcb05; }
        .hud-label { font-size: 10px; text-transform: uppercase; color: #888; }

        /* 3D 對戰場地 */
        .table-top {
            position: relative; width: 1000px; height: 600px;
            background: var(--mat-color); border-radius: 40px / 200px;
            border: 10px solid #142b14; margin-top: 20px;
            display: grid; grid-template-columns: 180px 1fr 180px;
            padding: 30px; gap: 20px; box-sizing: border-box;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
        }

        .zone {
            border: 2px dashed var(--slot-border); border-radius: 10px;
            background: rgba(0,0,0,0.2); position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .zone.highlight { background: rgba(255, 203, 5, 0.1); border-style: solid; }

        /* 獎賞卡斜放效果 */
        .prize-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* 卡牌物件 */
        .card {
            width: var(--card-w); height: var(--card-h);
            position: absolute; transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
        }

        .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s;
        }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 6px;
            border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .front { background: white; color: #333; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-align: center; }
        .back { background: #1976d2; background-image: radial-gradient(#1e88e5 1px, transparent 1px); background-size: 4px 4px; }

        /* 能量卡疊放樣式 */
        .energy-under { transform: translate(10px, 15px) !important; z-index: -1; }

        /* 洗牌動畫 */
        @keyframes proShuffle {
            0% { transform: rotate(0deg) translate(0, 0); }
            25% { transform: rotate(5deg) translate(20px, -10px); }
            75% { transform: rotate(-5deg) translate(-20px, 10px); }
            100% { transform: rotate(0deg) translate(0, 0); }
        }
        .shuffle-anim { animation: proShuffle 0.2s infinite; }

        /* 手牌區控制 */
        .hand-dock {
            position: fixed; bottom: -20px; width: 80%; height: 160px;
            background: rgba(20, 20, 20, 0.9); border-radius: 30px 30px 0 0;
            display: flex; justify-content: center; align-items: center;
            padding: 0 50px; gap: -20px; transition: 0.3s;
            backdrop-filter: blur(10px); border: 1px solid #333;
        }
        .hand-dock:hover { bottom: 0; }

        button.pro-btn {
            background: #ffcb05; border: none; padding: 10px 20px;
            font-weight: bold; border-radius: 5px; cursor: pointer;
            box-shadow: 0 4px #b38f00; transition: 0.1s;
        }
        button.pro-btn:active { transform: translateY(2px); box-shadow: 0 2px #b38f00; }
    </style>
</head>
<body>

<div class="hud">
    <div class="hud-item"><span class="hud-label">Turn</span><span class="hud-value" id="turn-val">1</span></div>
    <div class="hud-item"><span class="hud-label">Prizes</span><span class="hud-value" id="prize-val">6</span></div>
    <div class="hud-item"><span class="hud-label">Status</span><span class="hud-value" id="game-status">Ready</span></div>
    <button class="pro-btn" onclick="startGame()">INITIALIZE SETUP</button>
    <button class="pro-btn" style="background:#e53935; color:white; box-shadow:0 4px #b71c1c;" onclick="endTurn()">END TURN</button>
</div>

<div class="table-top">
    <div class="prize-grid" id="prize-zone">
        <div class="zone" style="width:70px; height:98px;"></div>
        <div class="zone" style="width:70px; height:98px;"></div>
        <div class="zone" style="width:70px; height:98px;"></div>
        <div class="zone" style="width:70px; height:98px;"></div>
        <div class="zone" style="width:70px; height:98px;"></div>
        <div class="zone" style="width:70px; height:98px;"></div>
    </div>

    <div style="display:flex; flex-direction:column; gap:40px;">
        <div class="zone" id="active-spot" style="width:120px; height:168px; align-self:center;" data-label="Active"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <div class="zone" style="width:90px; height:126px;" data-label="Bench"></div>
            <div class="zone" style="width:90px; height:126px;"></div>
            <div class="zone" style="width:90px; height:126px;"></div>
            <div class="zone" style="width:90px; height:126px;"></div>
            <div class="zone" style="width:90px; height:126px;"></div>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:30px;">
        <div class="zone" style="height:120px;" data-label="Discard"></div>
        <div id="deck-container" style="position:relative; height:160px; cursor:pointer;" onclick="drawCard()">
            <div id="deck-stack"></div>
        </div>
    </div>
</div>

<div class="hand-dock" id="hand-display"></div>

<script>
    // 專業級物件導向配置
    const CARD_LIST = [
        { name: "Dragapult ex", type: "Pokemon", hp: 320, stage: 2 },
        { name: "Drakloak", type: "Pokemon", hp: 90, stage: 1 },
        { name: "Dreepy", type: "Pokemon", hp: 60, stage: 0 },
        { name: "Fire Energy", type: "Energy" },
        { name: "Psychic Energy", type: "Energy" },
        { name: "Lillie's Determination", type: "Supporter" },
        { name: "Ultra Ball", type: "Item" }
    ];

    let deck = [];
    let hand = [];
    let gameReady = false;

    // 1. 初始化 60 張牌並建立厚度感
    function initDeck() {
        deck = [];
        for(let i=0; i<60; i++) {
            const proto = CARD_LIST[i % CARD_LIST.length];
            deck.push({ ...proto, id: 'c' + i, flipped: false });
        }
        renderDeckStack();
    }

    function renderDeckStack() {
        const stack = document.getElementById('deck-stack');
        stack.innerHTML = "";
        const count = Math.min(deck.length, 15);
        for(let i=0; i<count; i++) {
            const d = document.createElement('div');
            d.className = "card-face back";
            d.style.transform = `translateY(${-i*1.5}px) translateX(${i*0.5}px)`;
            d.style.zIndex = i;
            stack.appendChild(d);
        }
    }

    // 2. 官方 Setup 流程 [影片 00:00:12]
    async function startGame() {
        initDeck();
        document.getElementById('game-status').innerText = "Shuffling...";
        document.getElementById('deck-stack').classList.add('shuffle-anim');
        
        // Fisher-Yates
        await new Promise(r => setTimeout(r, 1500));
        deck.sort(() => Math.random() - 0.5);
        document.getElementById('deck-stack').classList.remove('shuffle-anim');

        // 抽 7 張手牌
        for(let i=0; i<7; i++) await drawCard();
        
        // 佈置獎賞卡
        document.getElementById('game-status').innerText = "Placing Prizes...";
        const prizeSlots = document.querySelectorAll('#prize-zone .zone');
        prizeSlots.forEach(slot => {
            const pCard = deck.shift();
            slot.innerHTML = `<div class="card-face back" style="width:100%; height:100%; position:static;"></div>`;
        });
        
        document.getElementById('game-status').innerText = "Battle Start!";
        gameReady = true;
    }

    // 3. 物理感抽牌動畫
    function drawCard() {
        if(deck.length === 0) return;
        const cardData = deck.shift();
        const deckEl = document.getElementById('deck-container');
        const rect = deckEl.getBoundingClientRect();

        const fly = document.createElement('div');
        fly.className = "card";
        fly.style.left = rect.left + "px"; fly.style.top = rect.top + "px";
        fly.innerHTML = `<div class="card-inner"><div class="card-face back"></div><div class="card-face front">${cardData.name}</div></div>`;
        document.body.appendChild(fly);

        // 飛向手牌
        setTimeout(() => {
            fly.style.left = "50%";
            fly.style.top = "90%";
            fly.querySelector('.card-inner').style.transform = "rotateY(180deg)";
        }, 10);

        setTimeout(() => {
            document.body.removeChild(fly);
            hand.push(cardData);
            renderHand();
            renderDeckStack();
        }, 600);
    }

    function renderHand() {
        const dock = document.getElementById('hand-display');
        dock.innerHTML = "";
        hand.forEach((card, i) => {
            const c = document.createElement('div');
            c.className = "card";
            c.style.position = "relative";
            c.style.marginRight = "-30px";
            c.innerHTML = `<div class="card-inner" style="transform:rotateY(180deg)">
                <div class="card-face front">
                    ${card.name}<br><span style="color:blue">[${card.type}]</span>
                </div>
            </div>`;
            c.onclick = () => playToActive(i);
            dock.appendChild(c);
        });
    }

    function playToActive(index) {
        const card = hand[index];
        const active = document.getElementById('active-spot');
        
        // 專業邏輯：如果是能量卡，疊在下方
        if(card.type === "Energy") {
            const e = document.createElement('div');
            e.className = "card-face front energy-under";
            e.innerText = "Energy";
            active.appendChild(e);
        } else {
            active.innerHTML = `<div class="card-face front" style="width:100%; height:100%; position:static;">${card.name}</div>`;
        }
        
        hand.splice(index, 1);
        renderHand();
    }

    function endTurn() {
        alert("Turn Ended. Waiting for Opponent...");
        // 此處可擴充自動化 AI 邏輯
    }
</script>
</body>
</html>
