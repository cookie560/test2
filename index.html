<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG Ultimate - Fix Edition</title>
    <style>
        :root {
            --ptcg-blue: #1b3664;
            --ptcg-gold: #ffcb05;
            --live-blue: #00d2ff;
            --energy-color: #ff4ed2;
            --card-w: 80px;
            --card-h: 112px;
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Exo 2', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- 3D 舞台 --- */
        .arena { perspective: 1500px; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a2a1a 0%, #000 100%); }
        .board-3d { width: 1150px; height: 650px; transform: rotateX(20deg); transform-style: preserve-3d; display: grid; grid-template-columns: 200px 1fr 200px; gap: 30px; }

        /* --- 擴張感應區域 --- */
        .slot { 
            border: 2.5px solid rgba(255,255,255,0.1); border-radius: 14px; 
            background: rgba(255,255,255,0.03); display: flex; align-items: center; 
            justify-content: center; position: relative; transition: 0.2s;
            pointer-events: all; /* 確保接收事件 */
        }
        
        /* 戰鬥場感應區 */
        .active-slot { width: 180px; height: 240px; border-color: var(--live-blue); }
        
        /* 備戰區感應區 */
        .bench-container { display: flex; gap: 15px; height: 140px; margin-top: 20px; }
        .bench-slot { width: 110px; height: 140px; }

        .slot.hover { border-color: var(--ptcg-gold); background: rgba(255,203,5,0.2); transform: scale(1.05); }

        /* --- 動畫特效 --- */
        @keyframes riffle-l { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-100px,-20px) rotate(-15deg)} }
        @keyframes riffle-r { 0%,100%{transform:translate(0,0)} 50%{transform:translate(100px,20px) rotate(15deg)} }
        .shf-l { animation: riffle-l 0.4s infinite !important; }
        .shf-r { animation: riffle-r 0.4s infinite !important; }
        
        @keyframes energy-fly { 0% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(2); opacity: 0; } }
        .energy-particle { position: fixed; width: 22px; height: 22px; background: var(--energy-color); border-radius: 50%; box-shadow: 0 0 25px var(--energy-color); z-index: 2000; pointer-events: none; }

        @keyframes shake-anim { 0%, 100% { transform: rotateX(20deg) translate(0,0); } 25% { transform: rotateX(20deg) translate(8px, 8px); } 75% { transform: rotateX(20deg) translate(-8px, -8px); } }
        .shake { animation: shake-anim 0.3s ease-in-out; }

        /* --- 卡牌基礎 --- */
        .card-entity { width: var(--card-w); height: var(--card-h); border-radius: 8px; border: 2px solid white; background-size: cover; position: relative; pointer-events: none; }
        .pokemon-back { width: 100%; height: 100%; background: var(--ptcg-blue); border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        /* --- UI --- */
        .hand { position: fixed; bottom: -10px; width: 100%; height: 160px; display: flex; justify-content: center; align-items: flex-end; z-index: 1000; }
        .hand-card { margin-left: -40px; transform-origin: bottom center; cursor: grab; pointer-events: all !important; }
        .hand-card:hover { transform: translateY(-80px) scale(1.5) rotate(0deg) !important; z-index: 1100; }

        .battle-log { position: fixed; left: 20px; bottom: 20px; width: 220px; height: 140px; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px; font-size: 11px; overflow-y: auto; color: #ccc; border-left: 4px solid var(--live-blue); }
        .side-menu { position: fixed; right: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #222; color: white; border: 1px solid #555; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .energy-count { position: absolute; top: -10px; right: -10px; width: 28px; height: 28px; background: var(--energy-color); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="arena">
    <div id="board" class="board-3d">
        <div id="prize-zone" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:20px;"></div>

        <div style="display:flex; flex-direction:column; align-items:center; justify-content:space-between;">
            <div id="opp-active" class="slot active-slot" style="opacity:0.8"></div>
            
            <div class="slot active-slot" 
                 ondragover="over(event)" ondragleave="leave(event)" ondrop="handleDrop(event, 'active', 0)">
                <div id="p-active-content"></div>
                <span style="position:absolute; opacity:0.2; font-size:12px;">ACTIVE SPOT</span>
            </div>
            
            <div class="bench-container">
                <div class="slot bench-slot" ondragover="over(event)" ondragleave="leave(event)" ondrop="handleDrop(event, 'bench', 0)"></div>
                <div class="slot bench-slot" ondragover="over(event)" ondragleave="leave(event)" ondrop="handleDrop(event, 'bench', 1)"></div>
                <div class="slot bench-slot" ondragover="over(event)" ondrop="handleDrop(event, 'bench', 2)"></div>
                <div class="slot bench-slot" ondragover="over(event)" ondrop="handleDrop(event, 'bench', 3)"></div>
                <div class="slot bench-slot" ondragover="over(event)" ondrop="handleDrop(event, 'bench', 4)"></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; justify-content:flex-end; gap:20px; padding:20px;">
            <div class="slot" style="height:140px; opacity:0.2;">DISCARD</div>
            <div id="deck-area" style="position:relative; height:150px; cursor:pointer;" onclick="drawCard()">
                <div id="deck-visual-stack"></div>
            </div>
        </div>
    </div>
</div>

<div class="battle-log" id="log"></div>

<div class="side-menu">
    <button class="btn" onclick="shuffleDeck()">🌀 SHUFFLE</button>
    <button id="energy-btn" class="btn" style="color:var(--energy-color)" onclick="attachEnergyAnimation()">🔋 ENERGY</button>
    <button class="btn" style="background:#800; border:none;" onclick="attack()">⚔️ ATTACK</button>
</div>

<div id="hand" class="hand"></div>

<script>
    const CARD_DATA = [
        { name: "Dragapult ex", stage: 2, hp: 320, img: "https://images.pokemontcg.io/sv6/130_hires.png" },
        { name: "Drakloak", stage: 1, hp: 90, img: "https://images.pokemontcg.io/sv6/129_hires.png" },
        { name: "Dreepy", stage: 0, hp: 70, img: "https://images.pokemontcg.io/sv6/128_hires.png" }
    ];

    let state = { deck: [], hand: [], prizes: 6, active: null, bench: [null,null,null,null,null], oppHp: 320 };

    function init() {
        for(let i=0; i<60; i++) state.deck.push({...CARD_DATA[i%3], id: Math.random(), energy: 0});
        state.deck.sort(() => Math.random() - 0.5);
        renderPrizes(); updateDeckUI();
        for(let i=0; i<7; i++) state.hand.push(state.deck.shift());
        renderHand(); renderBoard();
        addLog("Game Started. Interaction fixed.");
    }

    // 核心拖放修復
    function handleDrop(e, target, idx) {
        e.preventDefault();
        e.stopPropagation();
        e.currentTarget.classList.remove('hover');
        
        const handIdx = e.dataTransfer.getData("text/plain"); // 修正獲取方式
        if (handIdx === "") return;
        
        const newCard = state.hand[parseInt(handIdx)];
        let current = (target === 'active') ? state.active : state.bench[idx];

        // 進化或放置邏輯
        if (current && newCard.stage > current.stage) {
            addLog(`Evolved into ${newCard.name}!`);
            const evolved = { ...newCard, energy: current.energy, currentHp: newCard.hp };
            if(target === 'active') state.active = evolved; else state.bench[idx] = evolved;
        } else {
            const cardObj = { ...newCard, currentHp: newCard.hp, energy: 0 };
            if(target === 'active') state.active = cardObj; else state.bench[idx] = cardObj;
            addLog(`Placed ${newCard.name}.`);
        }
        
        state.hand.splice(handIdx, 1);
        renderHand(); renderBoard();
    }

    function renderBoard() {
        // 更新出戰位 (第一個 .active-slot 是對手的，第二個是玩家的)
        const pActiveSlot = document.querySelectorAll('.active-slot')[1];
        pActiveSlot.querySelector('div').innerHTML = state.active ? createCardHTML(state.active, true) : "";
        
        // 更新備戰位
        const bSlots = document.querySelectorAll('.bench-slot');
        state.bench.forEach((c, i) => {
            bSlots[i].innerHTML = c ? createCardHTML(c, false) : "";
        });

        // 對手
        document.getElementById('opp-active').innerHTML = createCardHTML({img: CARD_DATA[0].img, energy: 2, currentHp: state.oppHp, hp: 320}, true);
    }

    function createCardHTML(c, isActive) {
        const style = isActive ? "width:120px; height:168px;" : "width:90px; height:126px;";
        return `<div class="card-entity" style="background-image:url(${c.img}); ${style}">
            <div class="energy-count">${c.energy || 0}</div>
            <div style="position:absolute; bottom:-10px; width:100%; text-align:center; font-size:10px; background:rgba(0,0,0,0.8);">HP: ${c.currentHp || c.hp}</div>
        </div>`;
    }

    // 基礎功能
    function over(e) { e.preventDefault(); e.currentTarget.classList.add('hover'); }
    function leave(e) { e.currentTarget.classList.remove('hover'); }
    
    function renderHand() {
        const h = document.getElementById('hand'); h.innerHTML = "";
        state.hand.forEach((c, i) => {
            const el = document.createElement('div'); el.className = "card-entity hand-card";
            el.style.backgroundImage = `url(${c.img})`;
            el.draggable = true;
            // 確保拖拽數據正確
            el.ondragstart = (e) => { e.dataTransfer.setData("text/plain", i); };
            el.style.transform = `rotate(${(i-(state.hand.length-1)/2)*5}deg)`;
            h.appendChild(el);
        });
    }

    function drawCard() { if(state.deck.length > 0) { state.hand.push(state.deck.shift()); renderHand(); updateDeckUI(); } }
    function updateDeckUI() {
        const s = document.getElementById('deck-visual-stack'); s.innerHTML = "";
        for(let i=0; i<Math.min(state.deck.length, 8); i++) {
            s.innerHTML += `<div class="pokemon-back d-stack-card" style="position:absolute; width:80px; height:112px; top:-${i}px; left:${i}px; z-index:${i}"></div>`;
        }
    }
    function renderPrizes() {
        const z = document.getElementById('prize-zone'); z.innerHTML = "";
        for(let i=0; i<state.prizes; i++) z.innerHTML += `<div class="slot" style="height:80px; width:60px;"><div class="pokemon-back"></div></div>`;
    }
    function shuffleDeck() {
        const cards = document.querySelectorAll('.d-stack-card');
        cards.forEach((c, i) => c.classList.add(i % 2 === 0 ? 'shf-l' : 'shf-r'));
        setTimeout(() => { state.deck.sort(() => Math.random()-0.5); cards.forEach(c=>c.classList.remove('shf-l','shf-r')); updateDeckUI(); addLog("Shuffled."); }, 1000);
    }
    function attachEnergyAnimation() {
        if(!state.active) return;
        const btn = document.getElementById('energy-btn').getBoundingClientRect();
        const target = document.querySelectorAll('.active-slot')[1].getBoundingClientRect();
        const p = document.createElement('div'); p.className = "energy-particle";
        p.style.left = btn.left+"px"; p.style.top = btn.top+"px";
        p.style.setProperty('--tx', (target.left-btn.left+80)+"px");
        p.style.setProperty('--ty', (target.top-btn.top+100)+"px");
        p.style.animation = "energy-fly 0.6s forwards";
        document.body.appendChild(p);
        setTimeout(() => { p.remove(); state.active.energy++; renderBoard(); }, 600);
    }
    function attack() {
        if(!state.active || state.active.energy < 2) return;
        document.getElementById('board').classList.add('shake');
        state.oppHp -= 200; 
        setTimeout(() => { 
            document.getElementById('board').classList.remove('shake'); 
            if(state.oppHp<=0){ state.oppHp=320; state.prizes--; renderPrizes(); }
            renderBoard(); 
        }, 300);
    }
    function addLog(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }

    init();
</script>
</body>
</html>
