<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 模擬介面 - 參考圖版</title>
    <style>
        :root {
            --bg-green: #66bb6a; /* 參考圖的桌墊綠 */
            --slot-border: rgba(255, 255, 255, 0.6);
            --card-w: 60px;
            --card-h: 84px;
        }

        body {
            margin: 0; background-color: #f0f0f0;
            display: flex; flex-direction: column; align-items: center;
            font-family: sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* 1. 綠色對戰桌墊 */
        .play-mat {
            position: relative;
            width: 800px; height: 500px;
            background-color: var(--bg-green);
            border: 8px solid #c8e6c9; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 20px;
            overflow: hidden;
        }

        /* 桌墊中央精靈球線條 */
        .mat-pattern {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            border: 6px solid #fff; border-radius: 50%;
            opacity: 0.5;
        }
        .mat-pattern::after {
            content: ''; position: absolute; top: 50%; left: 0;
            width: 100%; height: 6px; background-color: #fff; transform: translateY(-50%);
        }

        /* 通用插槽樣式 */
        .slot {
            border: 2px solid var(--slot-border); border-radius: 6px;
            position: absolute; display: flex; align-items: center; justify-content: center;
        }

        /* 2. 左側獎賞卡 (參考圖佈局) */
        .prize-row {
            position: absolute; left: 20px; top: 60px;
            display: flex; flex-direction: column; gap: 40px;
        }
        /* 堆疊效果 */
        .deck-stack { position: relative; width: var(--card-w); height: var(--card-h); }
        .deck-card {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; border-radius: 4px;
            background-size: cover; background-position: center;
            border: 1px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        /* 3. 中間主戰場 */
        /* 出戰區 */
        .active-spot {
            top: 150px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 98px; border: none; /* 這裡不顯示框框 */
        }

        /* 備戰區 (5空位) */
        .bench-row {
            bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px;
        }

        /* 4. 右側牌庫與功能 */
        .deck-btn {
            right: 20px; top: 160px;
            width: 70px; height: 98px; cursor: pointer; border: none;
        }

        /* 5. 底部手牌與抽牌動畫 */
        .hand-area {
            position: fixed; bottom: 0; width: 100%; height: 120px;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 10px; pointer-events: none;
        }
        .hand-card {
            width: 50px; height: 70px; /* 手牌小一些 */
            background-size: cover; border-radius: 3px; border: 1px solid #444;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            pointer-events: auto; transition: transform 0.2s; margin: 0 2px;
        }
        .hand-card:hover { transform: translateY(-10px); z-index: 100; }

        /* 抽卡飛行軌跡核心 (模擬參考圖箭頭) */
        .flying-card {
            position: fixed; z-index: 999;
            width: 50px; height: 70px;
            background-size: cover; border-radius: 3px; border: 2px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

    </style>
</head>
<body>

<div id="status" style="margin: 10px; font-weight: bold;"></div>

<div class="play-mat">
    <div class="mat-pattern"></div>

    <div class="prize-row">
        <div class="deck-stack">
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); z-index:0;"></div>
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-2px; left:-2px; z-index:1;"></div>
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-4px; left:-4px; z-index:2;"></div>
        </div>
        <div class="deck-stack">
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); z-index:0;"></div>
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-2px; left:-2px; z-index:1;"></div>
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-4px; left:-4px; z-index:2;"></div>
        </div>
        <div class="deck-stack">
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); z-index:0;"></div>
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-2px; left:-2px; z-index:1;"></div>
            <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-4px; left:-4px; z-index:2;"></div>
        </div>
    </div>

    <div class="slot active-spot">
        <div class="deck-card" style="background-image:url('https://images.pokemontcg.io/base3/31_hires.png'); border:none;"></div>
    </div>

    <div class="bench-row" id="bench">
        <div class="slot" style="width:60px; height:84px;" data-label="備戰"></div>
        <div class="slot" style="width:60px; height:84px;"></div>
        <div class="slot" style="width:60px; height:84px;"></div>
        <div class="slot" style="width:60px; height:84px;"></div>
        <div class="slot" style="width:60px; height:84px;"></div>
    </div>

    <div class="slot deck-btn" id="deck-zone" onclick="drawCard()">
        <div class="deck-card" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); z-index:0; transform:rotate(-3deg)"></div>
        <div class="deck-card" id="deck-top" style="background-image:url('https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Pokemon_Trading_Card_Game_cardback.jpg/220px-Pokemon_Trading_Card_Game_cardback.jpg'); top:-3px; left:-3px; z-index:1; cursor:pointer;"></div>
    </div>
</div>

<div class="hand-area" id="hand-display"></div>

<script>
    // 預設手牌 (參考圖上的配置)
    const initialHand = [
        'https://images.pokemontcg.io/sv1/1_hires.png',   // 妙蛙種子
        'https://images.pokemontcg.io/sv1/4_hires.png',   // 小火龍
        'https://images.pokemontcg.io/sm12/energy2_hires.png', // 格鬥能量卡
        'https://images.pokemontcg.io/sv1/191_hires.png', // 高級球 (道具)
        'https://images.pokemontcg.io/swsh8/148_hires.png', // 奇巴納 (支援者)
        'https://images.pokemontcg.io/swsh8/142_hires.png'  // 丹帝 (支援者)
    ];

    // 抽卡系統的目標：參考圖上的格鬥能量
    const drawingEnergyUrl = 'https://images.pokemontcg.io/sm12/energy2_hires.png';
    const handDisplay = document.getElementById('hand-display');

    // 初始化手牌
    function initHand() {
        initialHand.forEach(url => {
            const el = document.createElement('div');
            el.className = "hand-card";
            el.style.backgroundImage = `url('${url}')`;
            handDisplay.appendChild(el);
        });
    }

    async function drawCard() {
        // 抓取牌庫位置
        const deckTop = document.getElementById('deck-top');
        const deckRect = deckTop.getBoundingClientRect();
        
        // 建立飛行的卡片
        const flying = document.createElement('div');
        flying.className = "flying-card";
        flying.style.backgroundImage = `url('${drawingEnergyUrl}')`; // 參考圖抽到的格鬥能量
        flying.style.top = deckRect.top + "px";
        flying.style.left = deckRect.left + "px";
        document.body.appendChild(flying);

        // 計算目的地 (手牌區右側，模擬參考圖)
        const destX = window.innerWidth / 2 + 150; 
        const destY = window.innerHeight - 130; 

        // 啟動動畫 (需要觸發瀏覽器重繪)
        requestAnimationFrame(() => {
            flying.style.transform = `translate(${destX - deckRect.left}px, ${destY - deckRect.top}px) rotate(-15deg) scale(1.1)`;
            flying.style.opacity = "0.7";
        });

        // 動畫結束後加入手牌
        setTimeout(() => {
            document.body.removeChild(flying);
            const el = document.createElement('div');
            el.className = "hand-card";
            el.style.backgroundImage = `url('${drawingEnergyUrl}')`;
            handDisplay.appendChild(el);
        }, 600);
    }

    initHand();
</script>
</body>
</html>
